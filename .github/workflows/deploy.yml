name: deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .
      
      - uses: actions/deploy-pages@v4
