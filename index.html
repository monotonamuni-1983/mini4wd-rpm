<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini4WD RPM Analyzer ver6 – FFT2048 vs 4096</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; background: #fff; margin: 0; padding: 20px; }
h2 { margin-top: 0; }
h3 { margin-top: 30px; }
#rpmDisplay { font-size: 28px; font-weight: bold; margin: 10px 0; }
#shakeHz { font-size: 22px; margin: 10px 0; }
#status { margin: 10px 0; color: #555; }
button { padding: 15px 30px; font-size: 18px; border-radius: 999px; border: 1px solid #ccc; background: #f5f7ff; cursor: pointer; margin-right: 8px; }
button:disabled { background: #eee; cursor: default; }
canvas { width: 100%; background: #fafafa; margin-top: 10px; }
.fft-row { display: flex; gap: 20px; width: 100%; }
.fft-box { flex: 1; display: flex; flex-direction: column; }
.fft-info { margin: 5px 0 10px 0; padding: 6px 10px; background: #f3f3f3; border-radius: 6px; font-size: 16px; }
</style>
</head>
<body>

<h2>Mini4WD RPM Analyzer ver6– FFT2048 / FFT4096</h2>

<div id="status">ボタンを押してマイクを許可してください</div>
<button id="startButton">集音開始</button>
<button id="stopButton" disabled>集音停止</button>

<div id="rpmDisplay">RPM: --</div>
<div>揺れ幅：<span id="shakeHz">-- Hz</span></div>
<div id="maxRpmBox">MAX RPM: --</div>

<h3>スペクトラム比較</h3>
<div class="fft-row">
  <div class="fft-box">
    <div class="fft-info"><div id="rpm2048">RPM (2048): --</div></div>
    <canvas id="fft2048Canvas" height="200"></canvas>
  </div>
  <div class="fft-box">
    <div class="fft-info"><div id="rpm4096">RPM (4096): --</div></div>
    <canvas id="fft4096Canvas" height="200"></canvas>
  </div>
</div>

<script>
let audioCtx = null;
let analyser2048 = null;
let analyser4096 = null;
let analyserTime = null;
let data2048 = null;
let data4096 = null;
let timeData = null;
let isRunning = false;
let maxRpm = 0;

const startButton = document.getElementById("startButton");
const stopButton = document.getElementById("stopButton");
const statusEl = document.getElementById("status");

async function startAudio() {
    try {
        // iPhone対応：ユーザー操作後にAudioContext生成
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        analyser2048 = audioCtx.createAnalyser();
        analyser2048.fftSize = 2048;
        data2048 = new Float32Array(analyser2048.frequencyBinCount);

        analyser4096 = audioCtx.createAnalyser();
        analyser4096.fftSize = 4096;
        data4096 = new Float32Array(analyser4096.frequencyBinCount);

        analyserTime = audioCtx.createAnalyser();
        analyserTime.fftSize = 2048;
        timeData = new Uint8Array(analyserTime.fftSize);

        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser2048);
        source.connect(analyser4096);
        source.connect(analyserTime);

        isRunning = true;
        startButton.disabled = true;
        stopButton.disabled = false;
        statusEl.textContent = "集音中...";
        mainLoop();
    } catch (err) {
        statusEl.textContent = "エラー: " + err.message;
    }
}

function detectPeaks(dataArray, fftSize, sampleRate) {
    const minBin = Math.floor(80 * fftSize / sampleRate);
    const maxBin = Math.floor(2000 * fftSize / sampleRate);
    let peaks = [];
    for (let i = minBin + 1; i < maxBin - 1; i++) {
        if (dataArray[i] > -50 && dataArray[i] > dataArray[i - 1] && dataArray[i] > dataArray[i + 1]) {
            peaks.push({ freq: (i * sampleRate) / fftSize });
        }
    }
    return peaks.sort((a, b) => b.value - a.value);
}

function mainLoop() {
    if (!isRunning) return;
    requestAnimationFrame(mainLoop);

    analyser2048.getFloatFrequencyData(data2048);
    analyser4096.getFloatFrequencyData(data4096);

    const peaks = detectPeaks(data4096, 4096, audioCtx.sampleRate);
    if (peaks.length > 0) {
        const rpm = peaks[0].freq * 60;
        document.getElementById("rpmDisplay").textContent = `RPM: ${rpm.toFixed(0)}`;
        if (rpm > maxRpm) maxRpm = rpm;
        document.getElementById("maxRpmBox").textContent = `MAX RPM: ${maxRpm.toFixed(0)}`;
    }
}

startButton.addEventListener("click", () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    else startAudio();
});

stopButton.addEventListener("click", () => {
    isRunning = false;
    if (audioCtx) audioCtx.close();
    startButton.disabled = false;
    stopButton.disabled = true;
});
</script>
</body>
</html>
