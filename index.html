<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini4WD RPM Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: sans-serif;
    background: #fff;
    margin: 0;
    padding: 20px;
}
h2 {
    margin-top: 0;
}
#rpmDisplay {
    font-size: 28px;
    font-weight: bold;
    margin: 10px 0;
}
#shakeHz {
    font-size: 22px;
    margin: 10px 0;
}
#status {
    margin: 10px 0;
    color: #555;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 999px;
    border: 1px solid #ccc;
    background: #f5f7ff;
    cursor: pointer;
    margin-right: 10px;
}
button:disabled {
    background: #eee;
    cursor: default;
}
canvas {
    width: 100%;
    height: 200px;
    background: #fafafa;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>Mini4WD RPM Analyzer</h2>

<div id="status">集音開始ボタンを押してください。</div>

<button id="startButton">集音開始</button>
<button id="stopButton" disabled>集音停止</button>

<div id="rpmDisplay">RPM: --</div>
<div>揺れ幅：<span id="shakeHz">-- Hz</span></div>

<canvas id="fftCanvas"></canvas>

<script>
// ===============================
// 基本変数
// ===============================
let audioCtx = null;
let analyser = null;
let dataArray = null;
let sampleRate = 48000;
let isRunning = false;
let micStream = null;

const canvas = document.getElementById("fftCanvas");
const ctx = canvas.getContext("2d");

const statusEl = document.getElementById("status");
const startButton = document.getElementById("startButton");
const stopButton = document.getElementById("stopButton");

// ===============================
// FFT描画
// ===============================
function drawFFT() {
    if (!ctx || !dataArray) return;

    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    ctx.strokeStyle = "#ff2e9f";
    ctx.lineWidth = 2;

    for (let i = 0; i < dataArray.length; i++) {
        const x = (i / dataArray.length) * w;
        const v = dataArray[i];
        const y = h - ((v + 140) / 80) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.stroke();
}

// ===============================
// ① FFT解析範囲 100〜1800Hz で複数ピーク検出
// ===============================
function detectPeaks(dataArray, sampleRate) {
    const fftSize = analyser.fftSize;

    const minBin = Math.floor(100 * fftSize / sampleRate);
    const maxBin = Math.floor(1800 * fftSize / sampleRate);

    const peaks = [];

    for (let i = minBin + 1; i < maxBin - 1; i++) {
        if (dataArray[i] > dataArray[i - 1] &&
            dataArray[i] > dataArray[i + 1]) {

            peaks.push({
                index: i,
                value: dataArray[i],
                freq: (i * sampleRate) / fftSize
            });
        }
    }

    return peaks;
}

// ===============================
// ② 複数ピークから基本周波数抽出
// ===============================
function extractFundamental(peaks) {
    if (peaks.length === 0) return 0;

    peaks.sort((a, b) => b.value - a.value);

    const candidates = [];

    peaks.forEach(p => {
        const f = p.freq;
        candidates.push(f);
        candidates.push(f / 2);
        candidates.push(f / 3);
        candidates.push(f / 4);
    });

    const valid = candidates.filter(f => f >= 100 && f <= 1800);

    if (valid.length === 0) return 0;

    return Math.min(...valid);
}

// ===============================
// ③ 基本周波数の揺れ幅測定
// ===============================
let fundamentalHistory = [];
const MAX_F_HISTORY = 200;

function recordFundamental(f) {
    fundamentalHistory.push(f);
    if (fundamentalHistory.length > MAX_F_HISTORY) {
        fundamentalHistory.shift();
    }
}

function getFundamentalShake() {
    if (fundamentalHistory.length < 5) return 0;

    const minF = Math.min(...fundamentalHistory);
    const maxF = Math.max(...fundamentalHistory);

    return maxF - minF;
}

// ===============================
// ④ 揺れ幅に応じた自動フィルタ
// ===============================
let filteredRpm = 0;

function autoFilter(rpm, shakeHz) {
    let alpha;

    if (shakeHz < 50) alpha = 0.6;        // 高速反応
    else if (shakeHz < 120) alpha = 0.3; // 中間
    else alpha = 0.1;                    // 安定重視

    filteredRpm = filteredRpm * (1 - alpha) + rpm * alpha;
    return filteredRpm;
}

// ===============================
// メインループ（統合ロジック）
// ===============================
function mainLoop() {
    if (!isRunning) return;
    requestAnimationFrame(mainLoop);

    analyser.getFloatFrequencyData(dataArray);

    const peaks = detectPeaks(dataArray, sampleRate);
    const fundamentalHz = extractFundamental(peaks);
    if (fundamentalHz === 0) return;

    recordFundamental(fundamentalHz);
    const shakeHz = getFundamentalShake();

    const rpm = fundamentalHz * 60 * 1.02; // 補正係数 1.02
    const stableRpm = autoFilter(rpm, shakeHz);

    document.getElementById("rpmDisplay").textContent =
        `RPM: ${stableRpm.toFixed(0)}`;

    document.getElementById("shakeHz").textContent =
        `${shakeHz.toFixed(1)} Hz`;

    drawFFT();
}

// ===============================
// 集音開始 → 許可 → 計測開始
// ===============================
startButton.addEventListener("click", async () => {
    statusEl.textContent = "マイク許可をリクエスト中…";

    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        statusEl.textContent = "集音中…";

        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 4096;

        dataArray = new Float32Array(analyser.frequencyBinCount);

        const source = audioCtx.createMediaStreamSource(micStream);
        source.connect(analyser);

        sampleRate = audioCtx.sampleRate;

        isRunning = true;
        startButton.disabled = true;
        stopButton.disabled = false;

        fundamentalHistory = [];
        filteredRpm = 0;

        mainLoop();

    } catch (e) {
        console.error(e);
        statusEl.textContent = "マイク許可が拒否されました。設定から許可してください。";
    }
});

// ===============================
// 集音停止（マイクも完全停止）
// ===============================
stopButton.addEventListener("click", () => {
    isRunning = false;

    if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
    }

    if (audioCtx) {
        audioCtx.close();
        audioCtx = null;
    }

    stopButton.disabled = true;
    startButton.disabled = false;
    statusEl.textContent = "停止中…";
});
</script>

</body>
</html>
