<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Mini4WD Hyper RPM Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
  :root {
    --bg-color: #f3f4f6;
    --panel-bg: #ffffff;
    --panel-border: #e5e7eb;
    --text-color: #1f2937;
    --text-muted: #6b7280;
    --accent-color: #3b82f6;
    --danger-color: #ef4444;
  }

  body {
    margin: 0;
    padding: 52px 20px 20px;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 16px;
  }

  .nav-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 6px 10px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--panel-border);
  }
  .nav-right { display: flex; gap: 6px; }
  .nav-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    color: var(--text-color);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .nav-btn.active {
    background: var(--accent-color);
    color: #fff;
    border-color: var(--accent-color);
  }

  .view-page { display: none; }
  .view-page.active { display: block; }

  .section {
    background: var(--panel-bg);
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 16px;
    border: 1px solid var(--panel-border);
  }
  .section h2 {
    font-size: 18px;
    border-bottom: 2px solid var(--accent-color);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .metrics-display {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    background: rgba(0,0,0,0.05);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .metric-box span {
    display: block;
    font-size: 18px;
    font-weight: bold;
  }
  .metric-large span { font-size: 26px; color: #10b981; }

  button {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: var(--accent-color);
    color: white;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-secondary { background: #4b5563; }
  .btn-danger { background: var(--danger-color); }

  .preset-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .preset-btn {
    font-size: 11px;
    padding: 6px 2px;
    background: #4b5563;
    color: #fff;
    border-radius: 6px;
    user-select: none;
    position: relative;
  }
  .preset-btn.empty::after {
    content: "+";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    font-size: 20px;
    font-weight: bold;
    color: white;
  }

  .table-responsive { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    border: 1px solid var(--panel-border);
    padding: 8px;
    font-size: 12px;
    text-align: center;
  }

  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background: var(--panel-bg);
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 420px;
  }

  .slider-row {
    margin-bottom: 8px;
    font-size: 13px;
  }
  .slider-row label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .slider-row input[type="range"] {
    width: 100%;
  }

  .btn-sm {
    padding: 4px 6px;
    font-size: 11px;
    width: auto;
  }

  #spectrumCanvas {
    width: 100%;
    height: 120px;
    background: #000;
    border-radius: 8px;
  }
</style>
</head>

<body>

<div class="nav-bar">
  <div class="nav-right">
    <button class="nav-btn active" id="navMainBtn" onclick="switchPage('main')">⏱</button>
    <button class="nav-btn" id="navHistoryBtn" onclick="switchPage('history')">📋</button>
    <button class="nav-btn" id="navSettingsBtn">⚙</button>
  </div>
</div>

<h1>Mini4WD Hyper RPM Analyzer</h1>

<!-- メインページ -->
<div id="pageMain" class="view-page active">
  <div class="section">
    <h2>現在の計測</h2>
    <div class="metrics-display">
      <div class="metric-box metric-large">
        <div>回転数</div>
        <span id="rpmValue">0 RPM</span>
      </div>
      <div class="metric-box metric-large">
        <div>速度</div>
        <span id="speedValue">0.0 km/h</span>
      </div>
      <div class="metric-box">
        <div>最大</div>
        <span id="sessMax">0</span>
      </div>
      <div class="metric-box">
        <div>最小</div>
        <span id="sessMin">0</span>
      </div>
      <div class="metric-box">
        <div>平均</div>
        <span id="sessAvg">0</span>
      </div>
      <div class="metric-box">
        <div>サンプル数</div>
        <span id="sessCount">0</span>
      </div>
    </div>

    <canvas id="spectrumCanvas"></canvas>

    <div style="display:flex; gap:8px; margin-top:10px;">
      <button id="startBtn">▶ 計測</button>
      <button id="lockBtn" class="btn-secondary">🔒 ロック</button>
      <button id="resetBtn" class="btn-secondary">リセット</button>
    </div>
    <div style="margin-top:8px;">
      <button id="saveBtn" class="btn-secondary">このセッションを保存</button>
    </div>
  </div>

  <div class="section">
    <h2>条件設定</h2>
    <div class="slider-row">
      <label>
        <span>電圧</span>
        <span id="valVolt">2.4V</span>
      </label>
      <input id="slideVolt" type="range" min="2.2" max="3.4" step="0.1" value="2.4" />
    </div>
    <div class="slider-row">
      <label>
        <span>ギヤ比</span>
        <span id="valGear">3.5:1</span>
      </label>
      <input id="slideGear" type="range" min="0" max="3" step="1" value="0" />
    </div>
    <div class="slider-row">
      <label>
        <span>タイヤ径</span>
        <span id="valTire">26.0mm</span>
      </label>
      <input id="slideTire" type="range" min="24" max="32" step="0.5" value="26" />
    </div>
    <div class="slider-row">
      <label>
        <span>慣らし状態</span>
        <span id="valPhase">慣らし前</span>
      </label>
      <select id="inputPhase">
        <option value="before">慣らし前</option>
        <option value="after">慣らし後</option>
      </select>
    </div>

    <div style="margin-top:10px;">
      <div style="font-size:13px; margin-bottom:4px;">プリセット（長押しで保存／タップで読込）</div>
      <div id="presetGrid" class="preset-grid"></div>
    </div>
  </div>

  <div class="section">
    <h2>マトリクス</h2>
    <div style="font-size:12px; margin-bottom:4px;">
      電圧：<span id="dispVolt">2.4 V</span> /
      ギヤ：<span id="dispGear">3.5 :1</span> /
      タイヤ：<span id="dispTire">26.0 mm</span>
    </div>
    <div class="table-responsive">
      <table id="matrixTable"></table>
    </div>
  </div>
</div>

<!-- 履歴ページ -->
<div id="pageHistory" class="view-page">
  <div class="section">
    <h2>全体計測履歴一覧</h2>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; font-size:12px;">
      <select id="filterName"></select>
      <select id="filterVolt"></select>
      <select id="filterGear"></select>
      <select id="filterTire"></select>
    </div>
    <button class="btn-secondary" onclick="applyFilters()">フィルタ適用</button>

    <div class="table-responsive" style="margin-top:8px;">
      <table>
        <thead>
          <tr>
            <th>日時</th>
            <th>モーター名</th>
            <th>最大RPM</th>
            <th>平均RPM</th>
            <th>電圧</th>
            <th>ギヤ</th>
            <th>タイヤ</th>
            <th>慣らし</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>

    <div style="margin-top:8px;">
      <button id="clearAllBtn" class="btn-danger">履歴をすべて削除</button>
    </div>
  </div>

  <div class="section">
    <h2>モーター比較</h2>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>モーター名</th>
            <th>電圧</th>
            <th>最大RPM</th>
            <th>平均RPM</th>
            <th>最高速度</th>
            <th>慣らし状況</th>
            <th>成長率</th>
          </tr>
        </thead>
        <tbody id="motorCompareTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- カルテページ -->
<div id="karte" class="view-page">
  <div class="section">
    <h2 id="karteTitle">モーター名：</h2>
    <div id="karteSummary" class="metrics-display"></div>
  </div>

  <div class="section">
    <h2>性能レーダーチャート</h2>
    <canvas id="karteRadar"></canvas>
  </div>

  <div class="section">
    <h2>慣らし前後比較</h2>
    <canvas id="karteBeforeAfter"></canvas>
  </div>

  <div class="section">
    <button class="btn-secondary" onclick="switchPage('history')">履歴一覧に戻る</button>
  </div>
</div>

<!-- 設定モーダル -->
<div id="settingsModal" class="modal-overlay">
  <div class="modal-content">
    <h2>設定</h2>
    <div class="slider-row">
      <label>ノイズしきい値 (dB)</label>
      <input id="inputNoise" type="number" value="-120" />
    </div>
    <div class="slider-row">
      <label>キャリブレーション係数</label>
      <input id="inputCalib" type="number" step="0.01" value="1.0" />
    </div>
    <button id="modalCloseBtn" class="btn-secondary" style="margin-top:10px;">閉じる</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const GEAR_VALUES = [3.5, 3.7, 4.0, 5.0];

let audioCtx = null;
let micStream = null;
let analyser = null;
let freqData = null;

let currentRPM = 0;
let currentSpeed = 0;
let currentSessionRPMs = [];
let running = false;
let locked = false;

let noiseThreshold = -120;
let calibFactor = 1.0;

let radarChart = null;
let beforeAfterChart = null;

const navMainBtn = document.getElementById("navMainBtn");
const navHistoryBtn = document.getElementById("navHistoryBtn");
const navSettingsBtn = document.getElementById("navSettingsBtn");

const slideVolt = document.getElementById("slideVolt");
const slideGear = document.getElementById("slideGear");
const slideTire = document.getElementById("slideTire");
const inputPhase = document.getElementById("inputPhase");

const dispVolt = document.getElementById("dispVolt");
const dispGear = document.getElementById("dispGear");
const dispTire = document.getElementById("dispTire");

const rpmValue = document.getElementById("rpmValue");
const speedValue = document.getElementById("speedValue");
const sessMax = document.getElementById("sessMax");
const sessMin = document.getElementById("sessMin");
const sessAvg = document.getElementById("sessAvg");
const sessCount = document.getElementById("sessCount");

const startBtn = document.getElementById("startBtn");
const lockBtn = document.getElementById("lockBtn");
const resetBtn = document.getElementById("resetBtn");
const saveBtn = document.getElementById("saveBtn");

const spectrumCanvas = document.getElementById("spectrumCanvas");
const spectrumCtx = spectrumCanvas.getContext("2d");

const settingsModal = document.getElementById("settingsModal");
const modalCloseBtn = document.getElementById("modalCloseBtn");
const inputNoise = document.getElementById("inputNoise");
const inputCalib = document.getElementById("inputCalib");

const clearAllBtn = document.getElementById("clearAllBtn");

/* ページ切り替え */
function switchPage(page) {
  document.querySelectorAll(".view-page").forEach(p => p.classList.remove("active"));
  document.getElementById("pageMain").classList.remove("active");
  document.getElementById("pageHistory").classList.remove("active");
  document.getElementById("karte").classList.remove("active");

  if (page === "main") document.getElementById("pageMain").classList.add("active");
  if (page === "history") document.getElementById("pageHistory").classList.add("active");
  if (page === "karte") document.getElementById("karte").classList.add("active");

  navMainBtn.classList.remove("active");
  navHistoryBtn.classList.remove("active");
  navSettingsBtn.classList.remove("active");

  if (page === "main") navMainBtn.classList.add("active");
  if (page === "history") navHistoryBtn.classList.add("active");
}

/* 設定モーダル */
navSettingsBtn.addEventListener("click", () => {
  settingsModal.classList.add("active");
});
modalCloseBtn.addEventListener("click", () => {
  noiseThreshold = parseFloat(inputNoise.value) || -120;
  calibFactor = parseFloat(inputCalib.value) || 1.0;
  settingsModal.classList.remove("active");
});

/* スライダー表示更新 */
function updateSliderLabels() {
  document.getElementById("valVolt").textContent = `${parseFloat(slideVolt.value).toFixed(1)}V`;
  document.getElementById("valGear").textContent = `${GEAR_VALUES[slideGear.value]}:1`;
  document.getElementById("valTire").textContent = `${parseFloat(slideTire.value).toFixed(1)}mm`;

  dispVolt.textContent = `${parseFloat(slideVolt.value).toFixed(1)} V`;
  dispGear.textContent = `${GEAR_VALUES[slideGear.value]} :1`;
  dispTire.textContent = `${parseFloat(slideTire.value).toFixed(1)} mm`;

  const phaseText = inputPhase.value === "after" ? "慣らし後" : "慣らし前";
  document.getElementById("valPhase").textContent = phaseText;

  updateMatrixTable();
}
slideVolt.addEventListener("input", updateSliderLabels);
slideGear.addEventListener("input", updateSliderLabels);
slideTire.addEventListener("input", updateSliderLabels);
inputPhase.addEventListener("change", updateSliderLabels);

/* プリセット管理 */
const presetGrid = document.getElementById("presetGrid");
let presetData = JSON.parse(localStorage.getItem("rpmPresetsV1") || "[]");

function savePresets() {
  localStorage.setItem("rpmPresetsV1", JSON.stringify(presetData));
}
function createPresetButtons() {
  presetGrid.innerHTML = "";
  for (let i = 0; i < 10; i++) {
    const btn = document.createElement("button");
    btn.className = "preset-btn";
    btn.dataset.index = i;

    const data = presetData[i];
    if (!data) {
      btn.classList.add("empty");
      btn.innerHTML = "";
    } else {
      btn.innerHTML = `<span class="preset-label">${data.label}</span>`;
    }

    btn.addEventListener("mousedown", () => {
      window.getSelection().removeAllRanges();
    });

    let pressTimer = null;
    btn.addEventListener("mousedown", e => {
      e.preventDefault();
      pressTimer = setTimeout(() => {
        storePreset(i);
      }, 600);
    });
    btn.addEventListener("mouseup", e => {
      e.preventDefault();
      if (pressTimer) {
        clearTimeout(pressTimer);
        loadPreset(i);
      }
    });
    btn.addEventListener("mouseleave", () => {
      if (pressTimer) clearTimeout(pressTimer);
    });

    presetGrid.appendChild(btn);
  }
}
function storePreset(index) {
  const volt = parseFloat(slideVolt.value);
  const gear = GEAR_VALUES[slideGear.value];
  const tire = parseFloat(slideTire.value);
  const phase = inputPhase.value;

  const label = `${volt.toFixed(1)}V / ${gear}:1 / ${tire.toFixed(1)}mm / ${phase === "after" ? "後" : "前"}`;
  presetData[index] = { volt, gear, tire, phase, label };
  savePresets();
  createPresetButtons();
}
function loadPreset(index) {
  const data = presetData[index];
  if (!data) return;
  slideVolt.value = data.volt;
  slideGear.value = GEAR_VALUES.indexOf(data.gear);
  slideTire.value = data.tire;
  inputPhase.value = data.phase;
  updateSliderLabels();
}
createPresetButtons();

/* マトリクス表 */
function updateMatrixTable() {
  const table = document.getElementById("matrixTable");
  table.innerHTML = "";

  const voltages = [];
  for (let v = 2.2; v <= 3.4 + 0.001; v += 0.1) {
    voltages.push(parseFloat(v.toFixed(1)));
  }

  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  headRow.innerHTML = `<th>V \\ Gear</th>` + GEAR_VALUES.map(g => `<th>${g}:1</th>`).join("");
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  const currentVolt = parseFloat(slideVolt.value);

  voltages.forEach(v => {
    const tr = document.createElement("tr");
    if (Math.abs(v - currentVolt) < 0.05) tr.classList.add("current-volt-row");

    let rowHtml = `<td>${v.toFixed(1)}V</td>`;
    GEAR_VALUES.forEach(g => {
      const rpm = currentRPM || 0;
      const speed = (rpm / g) * (Math.PI * (parseFloat(slideTire.value) / 1000)) * 60 / 1000;
      rowHtml += `<td>${rpm.toFixed(0)} / ${speed.toFixed(1)}km/h</td>`;
    });
    tr.innerHTML = rowHtml;
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
}

/* 履歴管理 */
function getHistorySafe() {
  try {
    const raw = localStorage.getItem("rpmHistoryV3");
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}
function populateFilterOptions(history) {
  const names = [...new Set(history.map(h => h.name))].sort();
  const volts = [...new Set(history.map(h => h.volt))].sort((a, b) => a - b);
  const gears = [...new Set(history.map(h => h.gear))].sort((a, b) => a - b);
  const tires = [...new Set(history.map(h => h.tire))].sort((a, b) => a - b);

  updateSelectOptions("filterName", names);
  updateSelectOptions("filterVolt", volts, "V");
  updateSelectOptions("filterGear", gears, ":1");
  updateSelectOptions("filterTire", tires, "mm");
}
function updateMotorCompareTable(history) {
  const tbody = document.getElementById("motorCompareTableBody");
  tbody.innerHTML = "";

  if (history.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="color:var(--text-muted);">データがありません。</td></tr>`;
    return;
  }

  const grouped = {};
  history.forEach(h => {
    const key = `${h.name}_${h.volt}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(h);
  });

  Object.keys(grouped).forEach(key => {
    const arr = grouped[key];
    const name = arr[0].name;
    const volt = arr[0].volt;

    const max = Math.max(...arr.map(h => h.maxRpm));
    const avg = Math.round(arr.reduce((s, h) => s + h.avgRpm, 0) / arr.length);
    const topSpeed = Math.max(...arr.map(h => h.maxSpeed));

    const before = arr.filter(h => h.breakInPhase === "before");
    const after = arr.filter(h => h.breakInPhase === "after");
    const beforeAvg = before.length ? before.reduce((s, h) => s + h.avgRpm, 0) / before.length : 0;
    const afterAvg = after.length ? after.reduce((s, h) => s + h.avgRpm, 0) / after.length : 0;
    const growth = beforeAvg > 0 ? ((afterAvg - beforeAvg) / beforeAvg) * 100 : 0;

    const phaseLabel =
      before.length && after.length ? "前→後" :
      after.length ? "後のみ" :
      before.length ? "前のみ" : "-";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${name}</td>
      <td>${volt.toFixed(1)}V</td>
      <td>${max}</td>
      <td>${avg}</td>
      <td>${topSpeed.toFixed(1)}km/h</td>
      <td>${phaseLabel}</td>
      <td>${growth.toFixed(1)}%</td>
    `;
    tbody.appendChild(tr);
  });
}
function updateSelectOptions(elementId, array, suffix = "") {
  const sel = document.getElementById(elementId);
  const current = sel.value;
  sel.innerHTML = `<option value="">すべて</option>`;
  array.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v + suffix;
    sel.appendChild(opt);
  });
  sel.value = current;
}
function applyFilters() {
  const nameF = document.getElementById("filterName").value;
  const voltF = document.getElementById("filterVolt").value;
  const gearF = document.getElementById("filterGear").value;
  const tireF = document.getElementById("filterTire").value;

  const history = getHistorySafe();
  const filtered = history.filter(h => {
    if (nameF && h.name !== nameF) return false;
    if (voltF && h.volt != voltF) return false;
    if (gearF && h.gear != gearF) return false;
    if (tireF && h.tire != tireF) return false;
    return true;
  });

  renderHistoryRows(filtered);
}
function renderHistoryRows(data) {
  const tbody = document.getElementById("historyTable");
  tbody.innerHTML = "";

  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="color:var(--text-muted);">データがありません。</td></tr>`;
    return;
  }

  data.forEach((item, idx) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.date}</td>
      <td>${item.name}</td>
      <td>${item.maxRpm}</td>
      <td>${item.avgRpm}</td>
      <td>${item.volt}</td>
      <td>${item.gear}</td>
      <td>${item.tire}</td>
      <td>${item.breakInPhase === "after" ? "後" : "前"}</td>
      <td>
        <button class="btn-sm" onclick="openKarte('${item.name}')">カルテ</button>
        <button class="btn-sm btn-danger" onclick="deleteHistory(${idx})">削除</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}
function updateAllHistoryComponents() {
  const history = getHistorySafe();
  populateFilterOptions(history);
  renderHistoryRows(history);
  updateMotorCompareTable(history);
}

/* カルテ表示 */
function openKarte(name) {
  const history = getHistorySafe().filter(h => h.name === name);
  if (history.length === 0) return;

  document.getElementById("karteTitle").textContent = `モーター名：${name}`;

  const max = Math.max(...history.map(h => h.maxRpm));
  const avg = Math.round(history.reduce((s, h) => s + h.avgRpm, 0) / history.length);
  const topSpeed = Math.max(...history.map(h => h.maxSpeed));

  document.getElementById("karteSummary").innerHTML = `
    <div class="metric-box"><span>${max}</span>最大回転数</div>
    <div class="metric-box"><span>${avg}</span>平均回転数</div>
    <div class="metric-box"><span>${topSpeed.toFixed(1)} km/h</span>最高速度</div>
  `;

  drawKarteRadar(history);
  drawBeforeAfterChart(history);

  switchPage("karte");
}

/* レーダーチャート */
function drawKarteRadar(data) {
  const max = Math.max(...data.map(h => h.maxRpm));
  const avg = Math.round(data.reduce((s, h) => s + h.avgRpm, 0) / data.length);
  const speed = Math.max(...data.map(h => h.maxSpeed));

  const labels = ["MAX", "AVG", "SPEED"];
  const values = [max, avg, speed];

  if (radarChart) radarChart.destroy();

  radarChart = new Chart(document.getElementById("karteRadar"), {
    type: "radar",
    data: {
      labels,
      datasets: [{
        label: "性能指標",
        data: values,
        backgroundColor: "rgba(59,130,246,0.3)",
        borderColor: "#3b82f6",
        borderWidth: 2
      }]
    },
    options: {
      scales: { r: { beginAtZero: true } }
    }
  });
}

/* 慣らし前後比較 */
function drawBeforeAfterChart(data) {
  const before = data.filter(h => h.breakInPhase === "before");
  const after = data.filter(h => h.breakInPhase === "after");

  const beforeAvg = before.length ? Math.round(before.reduce((s, h) => s + h.avgRpm, 0) / before.length) : 0;
  const afterAvg = after.length ? Math.round(after.reduce((s, h) => s + h.avgRpm, 0) / after.length) : 0;

  if (beforeAfterChart) beforeAfterChart.destroy();

  beforeAfterChart = new Chart(document.getElementById("karteBeforeAfter"), {
    type: "bar",
    data: {
      labels: ["慣らし前", "慣らし後"],
      datasets: [{
        label: "平均回転数",
        data: [beforeAvg, afterAvg],
        backgroundColor: ["#ef4444", "#10b981"]
      }]
    },
    options: { responsive: true }
  });
}

/* 履歴削除 */
function deleteHistory(index) {
  const history = getHistorySafe();
  history.splice(index, 1);
  localStorage.setItem("rpmHistoryV3", JSON.stringify(history));
  updateAllHistoryComponents();
}
clearAllBtn.addEventListener("click", () => {
  if (confirm("履歴をすべて削除しますか？")) {
    localStorage.removeItem("rpmHistoryV3");
    updateAllHistoryComponents();
  }
});

/* Web Audio 初期化 */
async function initAudio() {
  if (audioCtx) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const src = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;

  src.connect(analyser);
  freqData = new Uint8Array(analyser.frequencyBinCount);
}

/* スペクトラム描画 */
function drawSpectrum() {
  if (!spectrumCanvas.width || !spectrumCanvas.height) {
    spectrumCanvas.width = spectrumCanvas.clientWidth;
    spectrumCanvas.height = spectrumCanvas.clientHeight;
  }

  const w = spectrumCanvas.width;
  const h = spectrumCanvas.height;

  spectrumCtx.fillStyle = "#000";
  spectrumCtx.fillRect(0, 0, w, h);

  if (!analyser || !freqData) return;

  analyser.getByteFrequencyData(freqData);

  const barWidth = w / freqData.length;
  for (let i = 0; i < freqData.length; i++) {
    const v = freqData[i];
    const barHeight = (v / 255) * h;

    spectrumCtx.fillStyle = "#3b82f6";
    spectrumCtx.fillRect(i * barWidth, h - barHeight, barWidth, barHeight);
  }
}

/* FFT → RPM 推定 */
function estimateRPMFromSpectrum() {
  if (!analyser || !freqData) return 0;

  analyser.getByteFrequencyData(freqData);

  let maxVal = 0;
  let maxIndex = 0;

  for (let i = 1; i < freqData.length; i++) {
    if (freqData[i] > maxVal) {
      maxVal = freqData[i];
      maxIndex = i;
    }
  }

  if (maxVal < 10) return 0;

  const nyquist = audioCtx.sampleRate / 2;
  const freq = (maxIndex / freqData.length) * nyquist;

  const rpm = freq * 60 * calibFactor;
  return rpm;
}

/* メインループ */
function mainLoop() {
  if (running && !locked && audioCtx && analyser) {
    const rpm = estimateRPMFromSpectrum();
    currentRPM = rpm > 0 ? rpm : 0;

    const gear = GEAR_VALUES[slideGear.value];
    const tire = parseFloat(slideTire.value);
    const speed = (currentRPM / gear) * (Math.PI * (tire / 1000)) * 60 / 1000;
    currentSpeed = speed;

    rpmValue.textContent = `${currentRPM.toFixed(0)} RPM`;
    speedValue.textContent = `${currentSpeed.toFixed(1)} km/h`;

    if (currentRPM > 0) {
      currentSessionRPMs.push(currentRPM);

      const max = Math.max(...currentSessionRPMs);
      const min = Math.min(...currentSessionRPMs);
      const avg = currentSessionRPMs.reduce((s, v) => s + v, 0) / currentSessionRPMs.length;

      sessMax.textContent = max.toFixed(0);
      sessMin.textContent = min.toFixed(0);
      sessAvg.textContent = avg.toFixed(0);
      sessCount.textContent = currentSessionRPMs.length;
    }

    updateMatrixTable();
  }

  drawSpectrum();
  requestAnimationFrame(mainLoop);
}

/* 計測ボタン */
startBtn.addEventListener("click", async () => {
  if (!running) {
    await initAudio();
    running = true;
    startBtn.textContent = "■ 停止";
  } else {
    running = false;
    startBtn.textContent = "▶ 計測";
  }
});
lockBtn.addEventListener("click", () => {
  locked = !locked;
  lockBtn.classList.toggle("active");
});
resetBtn.addEventListener("click", () => {
  currentSessionRPMs = [];
  sessMax.textContent = 0;
  sessMin.textContent = 0;
  sessAvg.textContent = 0;
  sessCount.textContent = 0;
});

/* 保存 */
saveBtn.addEventListener("click", () => {
  if (currentSessionRPMs.length === 0) return;

  const max = Math.max(...currentSessionRPMs);
  const avg = Math.round(currentSessionRPMs.reduce((s, v) => s + v, 0) / currentSessionRPMs.length);
  const volt = parseFloat(slideVolt.value);
  const gear = GEAR_VALUES[slideGear.value];
  const tire = parseFloat(slideTire.value);
  const phase = inputPhase.value;

  const speed = (max / gear) * (Math.PI * (tire / 1000)) * 60 / 1000;

  const name = prompt("モーター名を入力してください", "");
  if (!name) return;

  const history = getHistorySafe();
  history.push({
    date: new Date().toLocaleString(),
    name,
    maxRpm: max,
    avgRpm: avg,
    volt,
    gear,
    tire,
    breakInPhase: phase,
    maxSpeed: speed
  });

  localStorage.setItem("rpmHistoryV3", JSON.stringify(history));
  updateAllHistoryComponents();
});

/* 初期化 */
updateSliderLabels();
updateAllHistoryComponents();
requestAnimationFrame(mainLoop);
</script>
