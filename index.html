<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini4WD RPM Analyzer – FFT4096 vs 16384</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; background: #fff; margin: 0; padding: 20px; }
h2 { margin-top: 0; }
h3 { margin-top: 30px; }
#rpmDisplay { font-size: 28px; font-weight: bold; margin: 10px 0; }
#shakeHz { font-size: 22px; margin: 10px 0; }
#status { margin: 10px 0; color: #555; }
button { padding: 10px 20px; font-size: 16px; border-radius: 999px; border: 1px solid #ccc; background: #f5f7ff; cursor: pointer; margin-right: 8px; }
button:disabled { background: #eee; cursor: default; }
canvas { width: 100%; background: #fafafa; margin-top: 10px; }
#fft4096Canvas, #fft16384Canvas { height: 200px; }
#rpmHzCanvas, #rpmHzOverlay { height: 200px; }
#rpmFlowCanvas { height: 150px; }
.rpmhz-wrapper { position: relative; }
#rpmHzOverlay { position: absolute; top: 0; left: 0; pointer-events: none; }
#maxRpmBox { margin-top: 10px; padding: 8px; background: #f0f0f0; border-radius: 8px; font-size: 20px; font-weight: bold; }
.fft-row { display: flex; gap: 20px; width: 100%; }
.fft-box { flex: 1; display: flex; flex-direction: column; }
.fft-info { margin: 5px 0 10px 0; padding: 6px 10px; background: #f3f3f3; border-radius: 6px; font-size: 18px; }
</style>
</head>
<body>
<h2>Mini4WD RPM Analyzer – FFT4096 / FFT16384 比較</h2>
<div id="status">マイク許可待ち…</div>
<button id="startButton" disabled>集音開始</button>
<button id="stopButton" disabled>集音停止</button>
<div id="rpmDisplay">RPM: --</div>
<div>揺れ幅：<span id="shakeHz">-- Hz</span></div>
<div id="maxRpmBox">MAX RPM: --</div>
<h3>FFT4096 / FFT16384 スペクトラム比較</h3>
<div class="fft-row">
  <div class="fft-box">
    <div class="fft-info">
      <div id="rpm4096">RPM: --</div>
      <div id="shake4096">揺れ幅：-- Hz</div>
    </div>
    <canvas id="fft4096Canvas"></canvas>
  </div>
  <div class="fft-box">
    <div class="fft-info">
      <div id="rpm16384">RPM: --</div>
      <div id="shake16384">揺れ幅：-- Hz</div>
    </div>
    <canvas id="fft16384Canvas"></canvas>
  </div>
</div>
<h3>RPM vs Hz グラフ</h3>
<div class="rpmhz-wrapper">
  <canvas id="rpmHzCanvas"></canvas>
  <canvas id="rpmHzOverlay"></canvas>
</div>
<h3>RPM 時系列フロー（右端0s / 左端60s）</h3>
<canvas id="rpmFlowCanvas"></canvas>
<script>
/* ============================
   FFT描画（細くハッキリ）
============================ */
function drawFFT(canvas, ctx, dataArray) {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = "#ff008c";
    ctx.lineWidth = 1 * devicePixelRatio;
    ctx.shadowColor = "rgba(255,0,140,0.4)";
    ctx.shadowBlur = 2;
    ctx.beginPath();
    for (let i = 0; i < dataArray.length; i++) {
        const x = (i / dataArray.length) * w;
        const y = h - ((dataArray[i] + 140) / 80) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

/* ============================
   RPM vs Hz グラフ
============================ */
function drawRpmHzGraph(canvas, ctx, overlayCtx, rpm, fundamentalHz) {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = "#333";
    ctx.beginPath();
    ctx.moveTo(40, 10);
    ctx.lineTo(40, h - 20);
    ctx.lineTo(w - 10, h - 20);
    ctx.stroke();
    ctx.fillStyle = "#ff008c";
    ctx.shadowColor = "rgba(255,0,140,0.4)";
    ctx.shadowBlur = 3;
    const x = 40 + (rpm / 60000) * (w - 60);
    const y = (h - 20) - ((fundamentalHz - 300) / 1200) * (h - 40);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
    overlayCtx.clearRect(0, 0, w, h);
    overlayCtx.strokeStyle = "rgba(255,0,150,0.3)";
    overlayCtx.lineWidth = 2;
    overlayCtx.beginPath();
    overlayCtx.arc(x, y, 10, 0, Math.PI * 2);
    overlayCtx.stroke();
}

/* ============================
   RPMフロー
============================ */
function drawRpmFlow(canvas, ctx, rpm, rpmHistory) {
    const w = canvas.width, h = canvas.height;
    const MIN_RPM = 6000, MAX_RPM = 60000;
    const rpmClamped = Math.max(rpm, MIN_RPM);
    rpmHistory.push(rpmClamped);
    if (rpmHistory.length > 300) rpmHistory.shift();
    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = "#e0e0e0";
    ctx.lineWidth = 1;
    const rpmGrid = [6000,10000,20000,30000,40000,50000,60000];
    rpmGrid.forEach(r => {
        const y = h - ((r - MIN_RPM) / (MAX_RPM - MIN_RPM)) * h;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        ctx.fillStyle = "#444"; ctx.font = "14px sans-serif";
        ctx.fillText(`${r} RPM`, 5, y - 4);
    });

    ctx.strokeStyle = "#888"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, h); ctx.stroke();

    ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 1;
    for (let x = w; x > 0; x -= w / 12) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
        const sec = Math.round((w - x) / w * 60);
        ctx.fillStyle = "#666"; ctx.font = "12px sans-serif";
        ctx.fillText(`${sec}s`, x + 2, 12);
    }

    ctx.strokeStyle = "#0077ff";
    ctx.lineWidth = 1 * devicePixelRatio;
    ctx.shadowColor = "rgba(0,120,255,0.35)";
    ctx.shadowBlur = 2;
    ctx.beginPath();
    for (let i = 0; i < rpmHistory.length; i++) {
        const x = w - (i * (w / 300));
        const y = h - ((rpmHistory[i] - MIN_RPM) / (MAX_RPM - MIN_RPM)) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

/* ============================
   グローバル
============================ */
let audioCtx = null, analyser4096 = null, analyser16384 = null, analyserTime = null;
let data4096 = null, data16384 = null, timeData = null;
let sampleRate = 48000, isRunning = false, micStream = null;
let fundamentalHistory = [], rpmHistory = [], filteredRpm = 0, maxRpm = 0;

/* ============================
   ピーク検出（1800Hz固定）
============================ */
function detectPeaks(dataArray, fftSize, sampleRate) {
    const minBin = Math.floor(100 * fftSize / sampleRate);
    const maxBin = Math.floor(1800 * fftSize / sampleRate);
    const peaks = [];
    for (let i = minBin + 1; i < maxBin - 1; i++) {
        if (dataArray[i] > dataArray[i - 1] &&
            dataArray[i] > dataArray[i + 1]) {
            peaks.push({
                index: i,
                value: dataArray[i],
                freq: (i * sampleRate) / fftSize
            });
        }
    }
    return peaks;
}

/* ============================
   強化基本周波数抽出
============================ */
function extractFundamentalStrong(peaks) {
    if (peaks.length === 1) return peaks[0].freq;
    if (peaks.length < 2) return 0;

    const freqs = peaks.map(p => p.freq);
    const diffs = [];
    for (let i = 0; i < freqs.length; i++) {
        for (let j = i + 1; j < freqs.length; j++) {
            const d = Math.abs(freqs[i] - freqs[j]);
            if (d > 50 && d < 2000) diffs.push(d);
        }
    }
    if (diffs.length === 0) return 0;

    const clusters = {};
    diffs.forEach(d => {
        const key = Math.round(d / 10) * 10;
        clusters[key] = (clusters[key] || 0) + 1;
    });

    const sorted = Object.entries(clusters).sort((a, b) => b[1] - a[1]);
    const fundamental = Number(sorted[0][0]);
    if (fundamental < 300 || fundamental > 1500) return 0;
    return fundamental;
}

/* ============================
   揺れ幅
============================ */
function recordFundamental(f) {
    fundamentalHistory.push(f);
    if (fundamentalHistory.length > 200) fundamentalHistory.shift();
}
function getFundamentalShake() {
    if (fundamentalHistory.length < 5) return 0;
    return Math.max(...fundamentalHistory) - Math.min(...fundamentalHistory);
}

/* ============================
   フィルタ
============================ */
function autoFilter(rpm, shakeHz) {
    let alpha = shakeHz < 50 ? 0.6 : shakeHz < 120 ? 0.3 : 0.1;
    filteredRpm = filteredRpm * (1 - alpha) + rpm * alpha;
    return filteredRpm;
}

/* ============================
   無音判定（弱め版）
============================ */
function isSilentHighPrecision() {
    analyserTime.getByteTimeDomainData(timeData);
    let sum = 0;
    for (let i = 0; i < timeData.length; i++) {
        sum += Math.abs(timeData[i] - 128);
    }
    const amp = sum / timeData.length;
    const amplitudeSilent = amp < 8;  // ← 弱めた

    let energy = 0;
    for (let i = 0; i < data4096.length; i++) {
        energy += data4096[i];
    }
    const fftSilent = energy < -15000; // ← 弱めた

    return amplitudeSilent && fftSilent;
}

/* ============================
   モーター音検出（弱め版）
============================ */
function isMotorSound(peaks) {
    if (peaks.length < 1) return false;
    const fundamental = extractFundamentalStrong(peaks);
    if (fundamental < 250 || fundamental > 2000) return false;
    return true;
}

/* ============================
   メインループ（止まらない版）
============================ */
function mainLoop() {
    if (!isRunning) return;
    requestAnimationFrame(mainLoop);

    analyser4096.getFloatFrequencyData(data4096);
    analyser16384.getFloatFrequencyData(data16384);

    const peaks4096 = detectPeaks(data4096, analyser4096.fftSize, sampleRate);
    const peaks16384 = detectPeaks(data16384, analyser16384.fftSize, sampleRate);

    if (isSilentHighPrecision()) {
        rpmDisplayEl.textContent = "RPM: --";
        shakeHzEl.textContent = "-- Hz";
        rpm4096El.textContent = "RPM: --";
        shake4096El.textContent = "揺れ幅：-- Hz";
        rpm16384El.textContent = "RPM: --";
        shake16384El.textContent = "揺れ幅：-- Hz";
        drawRpmFlow(rpmFlowCanvas, rpmFlowCanvas.getContext("2d"), 6000, rpmHistory);
        return;
    }

    if (!isMotorSound(peaks4096)) {
        rpmDisplayEl.textContent = "RPM: --";
        shakeHzEl.textContent = "-- Hz";
        drawRpmFlow(rpmFlowCanvas, rpmFlowCanvas.getContext("2d"), 6000, rpmHistory);
        return;
    }

    const fundamental4096 = extractFundamentalStrong(peaks4096);
    const fundamental16384 = extractFundamentalStrong(peaks16384);

    let fundamentalHz = fundamental4096 || fundamental16384 || 0;

    recordFundamental(fundamentalHz);
    const shakeHz = getFundamentalShake();

    const rpmBase = fundamentalHz * 60;
    const stableRpm = autoFilter(rpmBase, shakeHz);

    if (stableRpm > maxRpm) maxRpm = stableRpm;

    rpmDisplayEl.textContent = `RPM: ${stableRpm.toFixed(0)}`;
    shakeHzEl.textContent = `${shakeHz.toFixed(1)} Hz`;
    maxRpmBoxEl.textContent = `MAX RPM: ${maxRpm.toFixed(0)}`;

    rpm4096El.textContent = `RPM: ${fundamental4096 ? (fundamental4096 * 60).toFixed(0) : "--"}`;
    shake4096El.textContent = `揺れ幅：${shakeHz.toFixed(1)} Hz`;

    rpm16384El.textContent = `RPM: ${fundamental16384 ? (fundamental16384 * 60).toFixed(0) : "--"}`;
    shake16384El.textContent = `揺れ幅：${shakeHz.toFixed(1)} Hz`;

    drawFFT(fft4096Canvas, fft4096Canvas.getContext("2d"), data4096);
    drawFFT(fft16384Canvas, fft16384Canvas.getContext("2d"), data16384);
    drawRpmHzGraph(
        rpmHzCanvas,
        rpmHzCanvas.getContext("2d"),
        rpmHzOverlay.getContext("2d"),
        stableRpm,
        fundamentalHz
    );
    drawRpmFlow(
        rpmFlowCanvas,
        rpmFlowCanvas.getContext("2d"),
        stableRpm,
        rpmHistory
    );
}

/* ============================
   マイク準備
============================ */
async function prepareMic() {
    try {
        statusEl.textContent = "マイク許可をリクエスト中…";

        // マイクストリームを取得
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        statusEl.textContent = "マイク許可OK。集音開始ボタンを押してください。";
        startButton.disabled = false;

    } catch (e) {
        statusEl.textContent = "マイク許可が拒否されました。設定から許可してください。";
    }
}

/* ============================
   集音開始
============================ */
async function startAudio() {

    // micStream が null の場合は再取得（安全）
    if (!micStream) {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }

    // AudioContext を生成
    audioCtx = new AudioContext();
    sampleRate = audioCtx.sampleRate;

    // FFT4096
    analyser4096 = audioCtx.createAnalyser();
    analyser4096.fftSize = 4096;
    data4096 = new Float32Array(analyser4096.frequencyBinCount);

    // FFT16384
    analyser16384 = audioCtx.createAnalyser();
    analyser16384.fftSize = 16384;
    data16384 = new Float32Array(analyser16384.frequencyBinCount);

    // time-domain（無音判定用）
    analyserTime = audioCtx.createAnalyser();
    analyserTime.fftSize = 2048;
    timeData = new Uint8Array(analyserTime.fftSize);

    // マイク入力を接続
    const source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyser4096);
    source.connect(analyser16384);
    source.connect(analyserTime);

    // 状態初期化
    fundamentalHistory = [];
    rpmHistory = [];
    filteredRpm = 0;
    maxRpm = 0;

    isRunning = true;
    startButton.disabled = true;
    stopButton.disabled = false;
    statusEl.textContent = "集音中…";

    mainLoop();
}

/* ============================
   集音停止
============================ */
function stopAudio() {

    isRunning = false;
    stopButton.disabled = true;
    startButton.disabled = false;
    statusEl.textContent = "停止中…";

    // マイク停止
    if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
    }

    // AudioContext を安全に破棄
    if (audioCtx) {
        try { audioCtx.close(); } catch(e) {}
        audioCtx = null;
    }
}

/* ============================
   ボタンイベント
============================ */
startButton.addEventListener("click", startAudio);
stopButton.addEventListener("click", stopAudio);

/* ============================
   初期化
============================ */
prepareMic();
</script>

</body>
</html>
