<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Motor Tachometer Pro</title>
<style>
:root { --bg: #f2f2f7; --card: #ffffff; --accent: #007aff; }
body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #1c1c1e; padding: 15px; margin: 0; }
.container { max-width: 500px; margin: auto; }
/* グリッドを2分割してRPMとSPEEDで分ける */
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
.box { background: var(--card); padding: 12px; border-radius: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
.label { font-size: 0.65rem; color: #8e8e93; margin-bottom: 2px; }
.value { font-size: 1rem; font-weight: 700; }
.slider-box, .select-box { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
.controls { display: flex; gap: 8px; margin-bottom: 15px; }
button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
#startBtn { background: var(--accent); color: white; }
#stopBtn { background: #ff3b30; color: white; }
#resetBtn { background: #e5e5ea; }
select { width: 100%; padding: 12px; border-radius: 10px; font-size: 1rem; border: 1px solid #ccc; }
#canvas { width: 100%; height: 150px; background: #000; border-radius: 16px; display: block; touch-action: none; margin-bottom: 5px; }
.axis-labels { display: flex; justify-content: space-between; font-size: 0.6rem; color: #8e8e93; padding: 0 5px 15px; }
</style>
</head>
<body>

<div class="container">
<canvas id="canvas"></canvas>
<div class="axis-labels">
<span>0</span><span>200</span><span>500</span><span>1k</span><span>2k</span><span>5k</span><span>10k</span><span>20k</span><span>40k</span><span>50k</span>
</div>

<div class="grid">
<div class="box"><div class="label">RPM</div><div id="rpmCur" class="value">0</div></div>
<div class="box"><div class="label">MAX</div><div id="rpmMax" class="value">0</div></div>
<div class="box"><div class="label">MIN</div><div id="rpmMin" class="value">0</div></div>
</div>

<div class="grid">
<div class="box"><div class="label">SPEED</div><div id="spdCur" class="value">0.0</div></div>
<div class="box"><div class="label">MAX</div><div id="spdMax" class="value">0.0</div></div>
<div class="box"><div class="label">MIN</div><div id="spdMin" class="value">0.0</div></div>
</div>

<div class="controls">
<button id="startBtn">開始</button>
<button id="stopBtn" disabled>停止</button>
<button id="resetBtn">リセット</button>
</div>

<div class="slider-box">
<div class="label">タイヤ外径: <span id="tireVal">26.0</span>mm</div>
<input type="range" id="tireSlider" min="22.0" max="35.0" step="0.1" value="26.0" style="width: 100%;">
</div>

<div class="select-box">
<div class="label">ギア比選択</div>
<select id="gearSelect">
<option value="3.5">3.5:1</option>
<option value="3.7">3.7:1</option>
<option value="4.0">4.0:1</option>
<option value="4.2">4.2:1</option>
<option value="5.0">5.0:1</option>
<option value="6.4">6.4:1</option>
<option value="8.75">8.75:1</option>
<option value="11.2">11.2:1</option>
</select>
</div>
</div>

<script>
const CONFIG = { SENSITIVITY: 128, MAX_RPM: 50000 };
let audioCtx, analyser, dataArray, animationId, lastUpdate = 0;
let lastRpm = 0;
const stats = { maxRpm: 0, minRpm: 10000, maxSpd: 0, minSpd: Infinity };

const el = {
canvas: document.getElementById('canvas'),
rpmCur: document.getElementById('rpmCur'), rpmMax: document.getElementById('rpmMax'), rpmMin: document.getElementById('rpmMin'),
spdCur: document.getElementById('spdCur'), spdMax: document.getElementById('spdMax'), spdMin: document.getElementById('spdMin'),
tire: document.getElementById('tireSlider'), tireVal: document.getElementById('tireVal'),
gear: document.getElementById('gearSelect'),
start: document.getElementById('startBtn'), stop: document.getElementById('stopBtn'), reset: document.getElementById('resetBtn')
};

const ctx = el.canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
el.canvas.width = el.canvas.offsetWidth * dpr;
el.canvas.height = el.canvas.offsetHeight * dpr;
ctx.scale(dpr, dpr);
}
window.onload = resizeCanvas;

function updateSpeedDisplay(rpm) {
const gearRatio = parseFloat(el.gear.value);
const tireRpm = rpm / gearRatio;
const spd = (parseFloat(el.tire.value) * Math.PI * tireRpm * 60) / 1000000;
el.spdCur.textContent = spd.toFixed(1);
if (spd > stats.maxSpd) stats.maxSpd = spd;
stats.minSpd = Math.min(stats.minSpd, spd);
el.spdMax.textContent = stats.maxSpd.toFixed(1);
el.spdMin.textContent = stats.minSpd.toFixed(1);
}

el.gear.onchange = () => { if(lastRpm > 0) updateSpeedDisplay(lastRpm); };
el.tire.oninput = () => {
el.tireVal.textContent = el.tire.value;
if(lastRpm > 0) updateSpeedDisplay(lastRpm);
};

el.reset.onclick = () => {
lastRpm = 0; stats.maxRpm = 0; stats.minRpm = Infinity; stats.maxSpd = 0; stats.minSpd = Infinity;
[el.rpmCur, el.rpmMax, el.rpmMin].forEach(e => e.textContent = "0");
[el.spdCur, el.spdMax, el.spdMin].forEach(e => e.textContent = "0.0");
};

// 関数の外側（スクリプトの先頭など）であらかじめ変数を宣言しておく
let audioCtx, analyser, dataArray;

el.start.onclick = async () => {
    // 1. 連打防止のため、処理が始まった瞬間にスタートボタンを無効化する
    el.start.disabled = true;

    try {
        // 2. AudioContextの初期化と再開
        audioCtx = new AudioContext();
        await audioCtx.resume();

        // 3. マイク音声の取得（ユーザーの許可待ち）
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // 4. オーディオノードの接続
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 16384;
        source.connect(analyser);
        
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        // 5. 成功したらストップボタンを有効化して、ループ処理を開始
        el.stop.disabled = false;
        update();

    } catch (error) {
        // 6. ユーザーがマイクを拒否した、またはマイクがない場合のエラー処理
        console.error("マイクのアクセスに失敗しました:", error);
        alert("マイクの利用を許可してください。");
        
        // 失敗したのでスタートボタンを有効に戻す
        el.start.disabled = false;
    }
};


// 関数の外側（スクリプトの先頭など）であらかじめ宣言しておく
let audioCtx, analyser, dataArray, animationId;
let lastUpdate = 0;
let mediaStream = null; // マイクのストリームを保存する変数

// 【参考】前回のスタートボタン処理に「mediaStream = stream;」を1行追加してください
el.start.onclick = async () => {
    /* 前回の処理... */
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaStream = stream; // ここでストリームを保存しておく
    /* 残りの処理... */
};

// --- ここからが今回の修正 ---

el.stop.onclick = () => {
    // 1. 即座にアニメーションループを止める
    cancelAnimationFrame(animationId);
    animationId = null;

    // 2. マイクのハードウェア（トラック）を完全に停止して赤いマークを消す
    if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
    }

    // 3. オーディオコンテキストを閉じる
    if (audioCtx && audioCtx.state !== 'closed') {
        audioCtx.close();
    }

    el.start.disabled = false;
    el.stop.disabled = true;
};

function update(timestamp) {
    // 4. ストップボタンが押された後は、以降の処理を絶対に実行させない（安全対策）
    if (!animationId) return; 

    animationId = requestAnimationFrame(update);
    
    if (timestamp - lastUpdate < 50) return;
    lastUpdate = timestamp;

    // 5. アナライザーが存在することを確認してからデータを取得
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArray);

    // キャンバスのサイズ取得
    const cw = el.canvas.width / dpr;
    const h = el.canvas.height / dpr;
    ctx.clearRect(0, 0, cw, ch);

    let maxVal = 0, maxIndex = 0;
    ctx.beginPath();
    ctx.strokeStyle = '#007aff';
    ctx.lineWidth = 1.5;

    for (let i = 0; i < dataArray.length; i++) {
        if (dataArray[i] > maxVal) { 
            maxVal = dataArray[i]; 
            maxIndex = i; 
        }
        const x = (i / dataArray.length) * cw;
        
        // 感度（CONFIG.SENSITIVITY）で割り算をする際、0のときのエラー（ゼロ除算）を防止
        const sensitivity = CONFIG.SENSITIVITY || 255;
        const y = ch - (Math.min(dataArray[i], sensitivity) / sensitivity) * ch;
        
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
        ctx.stroke(); // 線の描画を確定

    // 1. 周波数の計算
    const hz = Math.round((maxIndex * audioCtx.sampleRate) / analyser.fftSize);

    // ミニ四駆のモーター音（数千〜数万RPM）を捉えるため、低すぎるノイズ（50Hz以下など）は無視
    if (hz > 50) {
        
        // 【最重要】3極モーターの特性を考慮し、3で割る（hz * 60 / 3 = hz * 20）
        lastRpm = hz * 20; 

        // エラー値（10万RPMなど現実離れした数値）のノイズを除去する安全弁
        if (lastRpm > 100000) return;

        // RPMの最大・最小値の更新（Infinityで管理）
        stats.maxRpm = Math.max(stats.maxRpm, lastRpm);
        stats.minRpm = Math.min(stats.minRpm, lastRpm);

        // テキスト表示の更新
        el.rpmCur.textContent = lastRpm.toLocaleString();
        el.rpmMax.textContent = stats.maxRpm.toLocaleString();
        el.rpmMin.textContent = (stats.minRpm === Infinity) ? "0" : stats.minRpm.toLocaleString();

        // 2. 速度表示の更新（RPMをそのまま渡せば関数内でギヤ比・タイヤ径から時速に変換されます）
        updateSpeedDisplay(lastRpm); 

        // --- キャンバスへの赤いインジケーター描画 ---
        ctx.save();
        ctx.font = '12px sans-serif'; // フォントサイズを明示的に指定
        
        // 赤い線の位置計算（キャンバスの横幅 cw を超えないように制限）
        let pos = (lastRpm / CONFIG.MAX_RPM) * cw;
        pos = Math.max(0, Math.min(pos, cw));
        
        // 赤い縦線の描画
        ctx.strokeStyle = '#ff3b30';
        ctx.lineWidth = 2.0;
        ctx.beginPath(); 
        ctx.moveTo(pos, 0); 
        ctx.lineTo(pos, ch); 
        ctx.stroke();
        
        // テキストと背景（黒帯）の描画（右端ではみ出さないように調整）
        const text = `${lastRpm.toLocaleString()} RPM`;
        const textWidth = ctx.measureText(text).width + 12; // 文字幅に合わせて背景幅を可変に
        
        let rectX = pos + 5;
        if (rectX + textWidth > cw) {
            rectX = pos - textWidth - 5; // 右端に近い場合は左側にポップアップを出す
        }

        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(rectX, 5, textWidth, 20);

        ctx.fillStyle = '#ff3b30';
        ctx.textBaseline = 'top';
        ctx.fillText(text, rectX + 6, 9);
        
        ctx.restore();
    }
} // update関数の閉じカッコ
</script>
</body>
</html>
