<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini4WD RPM Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: sans-serif;
    background: #fff;
    margin: 0;
    padding: 0;
}
#rpmDisplay {
    font-size: 32px;
    font-weight: bold;
    margin: 20px;
}
#shakeHz {
    font-size: 24px;
    margin: 20px;
}
canvas {
    width: 100%;
    height: 200px;
}
</style>
</head>

<body>

<h2>Mini4WD RPM Analyzer</h2>
<div id="rpmDisplay">RPM: --</div>
<div>揺れ幅：<span id="shakeHz">-- Hz</span></div>
<canvas id="fftCanvas"></canvas>

<script>
// ===============================
// Audio 初期化
// ===============================
let audioCtx;
let analyser;
let dataArray;
let sampleRate = 48000;

// ===============================
// 周波数揺れ計測バッファ
// ===============================
let freqHistory = [];
const MAX_HISTORY = 200;

// 周波数記録
function recordFrequency(peakHz) {
    freqHistory.push(peakHz);
    if (freqHistory.length > MAX_HISTORY) {
        freqHistory.shift();
    }
}

// 揺れ幅計算
function getFrequencyShake() {
    if (freqHistory.length < 5) return {min:0, max:0, shake:0};

    const minHz = Math.min(...freqHistory);
    const maxHz = Math.max(...freqHistory);

    return {
        min: minHz,
        max: maxHz,
        shake: maxHz - minHz
    };
}

// ===============================
// FFT ピーク検出
// ===============================
function detectPeak(dataArray, sampleRate) {
    let maxVal = -Infinity;
    let maxIndex = 0;

    for (let i = 0; i < dataArray.length; i++) {
        if (dataArray[i] > maxVal) {
            maxVal = dataArray[i];
            maxIndex = i;
        }
    }

    const peakHz = (maxIndex * sampleRate) / (dataArray.length * 2);
    return peakHz;
}

// ===============================
// RPM 計算
// ===============================
function computeRpm(peakHz) {
    return peakHz * 60;
}

// ===============================
// メインループ
// ===============================
function mainLoop() {
    requestAnimationFrame(mainLoop);

    analyser.getFloatFrequencyData(dataArray);

    const peakHz = detectPeak(dataArray, sampleRate);
    recordFrequency(peakHz);

    const rpm = computeRpm(peakHz);
    document.getElementById("rpmDisplay").textContent =
        `RPM: ${rpm.toFixed(0)}`;

    const shakeInfo = getFrequencyShake();
    document.getElementById("shakeHz").textContent =
        `${shakeInfo.shake.toFixed(1)} Hz`;
}

// ===============================
// Audio Start
// ===============================
async function startAudio() {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;

    dataArray = new Float32Array(analyser.frequencyBinCount);

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    sampleRate = audioCtx.sampleRate;

    mainLoop();
}

startAudio();
</script>

</body>
</html>
