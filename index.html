<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>High Precision Motor Lab</title>
    <style>
        body { background: #333; color: white; text-align: center; font-family: sans-serif; }
        #canvasContainer { width: 800px; margin: 20px auto; background: white; border: 2px solid #555; }
        canvas { display: block; }
        #stats { font-size: 1.5em; color: #ffeb3b; margin: 10px; }
    </style>
</head>
<body>
    <div id="stats">Peak: --- Hz | --- RPM</div>
    <div id="canvasContainer">
        <canvas id="scope" width="800" height="300"></canvas>
    </div>
    <button onclick="start()">計測開始</button>

    <script>
        const scope = document.getElementById('scope').getContext('2d');
        let analyser;

        async function start() {
            const ctx = new AudioContext();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            analyser = ctx.createAnalyser();
            analyser.fftSize = 2048;
            ctx.createMediaStreamSource(stream).connect(analyser);
            draw();
        }

        function draw() {
            const data = new Uint8Array(analyser.fftSize);
            analyser.getByteTimeDomainData(data);
            
            // 画面クリア
            scope.fillStyle = 'white';
            scope.fillRect(0, 0, 800, 300);
            
            // 波形描画
            scope.strokeStyle = 'black';
            scope.lineWidth = 2;
            scope.beginPath();
            for (let i = 0; i < data.length; i++) {
                const x = i * (800 / data.length);
                const y = 150 + (data[i] - 128) * 1.5; // 波形を中央に配置
                i === 0 ? scope.moveTo(x, y) : scope.lineTo(x, y);
            }
            scope.stroke();

            // ピーク周波数簡易計算
            const freqData = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(freqData);
            let maxIdx = 0;
            for(let i=0; i<freqData.length; i++) if(freqData[i] > freqData[maxIdx]) maxIdx = i;
            
            const hz = Math.round(maxIdx * 44100 / 2048);
            document.getElementById('stats').innerText = `Peak: ${hz}Hz | ${hz * 60} RPM`;

            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
