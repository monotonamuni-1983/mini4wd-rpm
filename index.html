<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini4WD RPM Analyzer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-title">Mini4WD RPM Analyzer</div>

    <div class="header-buttons">
      <button id="historyBtn">履歴</button>
      <button id="settingsBtn">設定</button>
    </div>
  </header>

  <!-- メイン画面 -->
  <main class="main-container">

    <!-- 波形表示 -->
    <canvas id="waveCanvas"></canvas>

    <!-- 計測条件 -->
    <div class="condition-card">
      <div class="condition-row">
        <span>電圧</span>
        <span id="voltageLabel">2.2V</span>
      </div>
      <input id="voltageRange" type="range" min="2.2" max="3.4" step="0.1" value="2.2" />
    </div>

    <!-- 4ボタン -->
    <div class="realtime-buttons">
      <button class="primary-btn" id="startBtn">開始</button>
      <button class="secondary-btn" id="lockBtn">ロック</button>
      <button class="secondary-btn" id="saveBtn">保存</button>
      <button class="secondary-btn" id="resetBtn">リセット</button>
    </div>

    <!-- 結果表示 -->
    <div class="result-card">
      <div class="result-row"><span>TOP</span><span id="topRpm">0</span></div>
      <div class="result-row"><span>MAX</span><span id="maxRpm">0</span></div>
      <div class="result-row"><span>AVG</span><span id="avgRpm">0</span></div>
    </div>

  </main>

  <!-- 履歴モーダル -->
  <div id="historyModalBackdrop" class="modal-backdrop hidden">
    <div class="modal">

      <!-- フィルタUI -->
      <div class="history-filter">
        <select id="filterMotor">
          <option value="">モーター指定なし</option>
        </select>

        <select id="filterVoltage">
          <option value="">電圧指定なし</option>
        </select>

        <select id="filterGear">
          <option value="">ギヤ比指定なし</option>
        </select>

        <select id="filterTire">
          <option value="">タイヤ指定なし</option>
        </select>
      </div>

      <!-- 固定ヘッダー -->
      <div class="history-header-fixed">
        <span>日付</span>
        <span>モーター</span>
        <span>電圧</span>
        <span>ギヤ比</span>
        <span>タイヤ</span>
        <span>TOP</span>
        <span>MAX</span>
        <span>AVG</span>
      </div>

      <div class="history-list" id="historyList"></div>

      <button id="closeHistory" class="close-btn">閉じる</button>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div id="settingsModalBackdrop" class="modal-backdrop hidden">
    <div class="modal">

      <!-- 説明ボタン -->
      <button id="helpButton" class="help-btn">？</button>

      <!-- 説明文 -->
      <div id="helpText" class="help-text hidden">
        <p><strong>ノイズ閾値：</strong>不要な信号や乱れ（ノイズ）を「許容するか・除去するか」を調整するときに使用する</p>
        <p><strong>モーター極数：</strong>モーターの内部で発生する磁石（N極とS極）の総数で使用する</p>
        <p><strong>RPM補正係数：</strong>計測数値に差異が存在するときに使用する</p>
        <p><strong>走行負荷：</strong>好みの負荷を与えたいときに使用する</p>
      </div>

      <!-- 設定項目 -->
      <div class="setting-item">
        <div class="setting-label">ノイズ閾値</div>
        <input id="noiseRange" type="range" min="0" max="100" step="1" value="20" />
        <div id="noiseLabel">20 dB</div>
      </div>

      <div class="setting-item">
        <div class="setting-label">モーター極数</div>
        <div id="poleMotorLabel">2</div>
        <input id="motorPoleRange" type="range" min="1" max="1" value="1" disabled />
      </div>

      <div class="setting-item">
        <div class="setting-label">RPM補正係数</div>
        <input id="rpmCalRange" type="range" min="0.5" max="1.5" step="0.01" value="1.00" />
        <div id="rpmCalLabel">1.00</div>
      </div>

      <div class="setting-item">
        <div class="setting-label">走行負荷（-100%〜+100%）</div>
        <input id="loadFactorRange" type="range" min="-100" max="100" step="1" value="0" />
        <div id="loadFactorLabel">0%</div>
      </div>

      <button id="closeSettings" class="close-btn">閉じる</button>
    </div>
  </div>

  <script src="js/preset.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
