<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini4WD Hyper RPM Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* （あなたの CSS はそのままなので省略せず全部入れる） */
/* ここにあなたの CSS 全部が入ります（省略なし） */
</style>
</head>

<body>

<div id="themeTooltip">✨ ここからライト/ダークテーマを切り替えられます！</div>

<div class="theme-toggle-container">
  <button class="theme-btn" id="themeToggleBtn">🌓 テーマ切替</button>
</div>

<h1>Mini4WD Hyper RPM Analyzer</h1>

<div class="grid-2">
  <div>
    <div class="section">
      <h2>リアルタイム計測</h2>
      
      <div class="metrics-display">
        <div class="metric-box metric-large">リアルタイム回転数 <span id="rpmValue">0 RPM</span></div>
        <div class="metric-box">設定電圧 <span id="dispVolt">3.0 V</span></div>
        <div class="metric-box">設定ギヤ比 <span id="dispGear">3.5 :1</span></div>
        <div class="metric-box">タイヤ外径 <span id="dispTire">25.0 mm</span></div>
        <div class="metric-box">走行速度 <span id="speedValue">0.0 km/h</span></div>
        <div class="metric-box">極数設定 <span id="dispPoles">1 P</span></div>
      </div>

      <div class="metrics-display" style="background: rgba(16,185,129,0.05); border: 1px solid rgba(16,185,129,0.2);">
        <div class="metric-box">セッション平均 <span id="sessAvg">0</span></div>
        <div class="metric-box">最高回転数 <span id="sessMax">0</span></div>
        <div class="metric-box">最低回転数 <span id="sessMin">0</span></div>
        <div class="metric-box">計測フレーム <span id="sessCount">0</span></div>
      </div>

      <button id="startBtn">▶ 計測開始</button>
      <div class="button-row">
        <button id="lockBtn" class="btn-secondary">🔒 ロック</button>
        <button id="saveBtn">💾 データを保存する</button>
        <button id="resetBtn" class="btn-danger">♻ リセット</button>
      </div>
    </div>

    <div class="section">
      <h2>高精度スペクトラム表示</h2>
      <canvas id="spectrumCanvas"></canvas>
      
      <div class="timelapse-container">
        <label style="font-size:12px; font-weight:bold;">⏳ タイムラプス・タイムライン</label>
        <input type="range" id="timelapseSlider" min="0" max="0" value="0" disabled>
        <div class="button-row">
          <button id="tlPlayBtn" class="btn-secondary" style="padding:4px;" disabled>▶ 再生</button>
          <button id="tlResetBtn" class="btn-danger" style="padding:4px;" disabled>クリア</button>
        </div>
      </div>
    </div>
  </div>
  <div>
    <div class="section">
      <h2>設定</h2>

      <label>電圧設定</label>
      <input type="range" id="slideVolt" min="1.0" max="5.0" step="0.1" value="3.0">
      <span id="valVolt">3.0V</span>

      <label>ギヤ比</label>
      <input type="range" id="slideGear" min="0" max="4" step="1" value="0">
      <span id="valGear">3.5:1</span>

      <label>タイヤ径</label>
      <input type="range" id="slideTire" min="20" max="35" step="0.5" value="25">
      <span id="valTire">25.0mm</span>

      <label>極数</label>
      <input type="number" id="inputPoles" min="1" max="4" value="1">

      <label>ノイズ閾値</label>
      <input type="number" id="inputNoise" value="-120">
    </div>

    <div class="section">
      <h2>電圧 × ギヤ比マトリクス</h2>
      <table id="matrixTable"></table>
    </div>
  </div>
</div>

<div class="section">
  <h2>履歴データ</h2>
  <div class="button-row">
    <button id="clearAllBtn" class="btn-danger">🗑 全削除</button>
    <button id="exportCSV">📄 CSV出力</button>
    <button id="exportExcel">📊 Excel出力</button>
  </div>

  <table class="history-table">
    <thead>
      <tr>
        <th>計測日</th><th>モーター名</th><th>MAX RPM</th><th>AVG RPM</th>
        <th>電圧</th><th>ギヤ比</th><th>タイヤ径</th><th>削除</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>
</div>

<script>
/* ============================
   変数定義
============================ */
let audioCtx, analyser, micSource;
let spectrumArray;
let running = false;
let locked = false;
let lockedData = null;
let currentSessionRPMs = [];
let globalTimelapseLog = [];
let timelapseTimer;
let isPlayingTimelapse = false;

const fftSize = 8192;
const canvas = document.getElementById("spectrumCanvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const lockBtn = document.getElementById("lockBtn");
const saveBtn = document.getElementById("saveBtn");
const resetBtn = document.getElementById("resetBtn");

const slideVolt = document.getElementById("slideVolt");
const slideGear = document.getElementById("slideGear");
const slideTire = document.getElementById("slideTire");
const inputPoles = document.getElementById("inputPoles");
const inputNoise = document.getElementById("inputNoise");

const timelapseSlider = document.getElementById("timelapseSlider");
const tlPlayBtn = document.getElementById("tlPlayBtn");
const tlResetBtn = document.getElementById("tlResetBtn");

const GEAR_VALUES = [3.5, 3.7, 4.0, 4.2, 5.0];
const MATRIX_VOLTS = [1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0];

/* ============================
   マイク起動（追加）
============================ */
startBtn.addEventListener("click", async () => {
  if (!running) {
    await initAudio();
    running = true;
    startBtn.textContent = "⏸ 停止";
  } else {
    running = false;
    startBtn.textContent = "▶ 計測開始";
  }
});

/* ============================
   ロック機能（追加）
============================ */
lockBtn.addEventListener("click", () => {
  if (!running) return;

  locked = !locked;

  if (locked) {
    const max = Math.max(...currentSessionRPMs);
    const avg = currentSessionRPMs.reduce((a,b)=>a+b, 0) / currentSessionRPMs.length;

    lockedData = {
      date: new Date().toLocaleString(),
      maxRpm: Math.round(max),
      avgRpm: Math.round(avg),
      volt: slideVolt.value,
      gear: GEAR_VALUES[slideGear.value],
      tire: slideTire.value,
      maxSpeed: (max / GEAR_VALUES[slideGear.value]) * (Math.PI * (slideTire.value / 1000)) * 60 / 1000
    };

    generateMatrixTable(lockedData.maxRpm, parseFloat(slideVolt.value));

    lockBtn.textContent = "🔓 ロック解除";
  } else {
    lockedData = null;
    lockBtn.textContent = "🔒 ロック";
  }
});

/* ============================
   スライダー変更時に行列表更新（追加）
============================ */
[slideVolt, slideGear, slideTire].forEach(sl => {
  sl.addEventListener("input", () => {
    updateSliderLabels();
    const max = currentSessionRPMs.length > 0 ? Math.max(...currentSessionRPMs) : 0;
    generateMatrixTable(max, parseFloat(slideVolt.value));
  });
});

/* ============================
   Audioエンジン
============================ */
async function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = fftSize;
    analyser.smoothingTimeConstant = 0.4;
    spectrumArray = new Uint8Array(analyser.frequencyBinCount);
  }
  analyser.minDecibels = parseFloat(inputNoise.value) || -120;

  if (!micSource) {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    micSource = audioCtx.createMediaStreamSource(stream);
    micSource.connect(analyser);
  }
}

/* ============================
   FFT → 周波数推定
============================ */
function estimateFrequencyAdvanced() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(spectrumArray);

  const sampleRate = audioCtx.sampleRate;
  const binResolution = sampleRate / fftSize;

  const minBin = Math.floor(80 / binResolution);
  const maxBin = Math.min(Math.floor(3000 / binResolution), spectrumArray.length - 2);

  let maxVal = 0;
  let maxIndex = -1;

  for (let i = minBin; i <= maxBin; i++) {
    if (spectrumArray[i] > maxVal) {
      maxVal = spectrumArray[i];
      maxIndex = i;
    }
  }
  if (maxIndex <= minBin || maxVal < 15) return 0;

  const yAlpha = spectrumArray[maxIndex - 1];
  const yBeta  = spectrumArray[maxIndex];
  const yGamma = spectrumArray[maxIndex + 1];

  const denominator = 2 * (2 * yBeta - yAlpha - yGamma);
  let p = 0;
  if (denominator !== 0) p = (yGamma - yAlpha) / denominator;

  return (maxIndex + p) * binResolution;
}

/* ============================
   RPM / 速度計算
============================ */
function calculateMetrics(freq) {
  if (freq <= 0) return { motorRPM: 0, speed: 0 };
  const targetGear = GEAR_VALUES[slideGear.value];
  const tireDiameter = parseFloat(slideTire.value);
  const poles = parseInt(inputPoles.value) || 1;

  const motorRPM = (freq * 60) / poles;
  const axleRPM = motorRPM / targetGear;
  const speed = axleRPM * (Math.PI * (tireDiameter / 1000)) * 60 / 1000;

  return { motorRPM, speed };
}

/* ============================
   描画
============================ */
function drawSpectrumGrid() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  if (canvas.width !== Math.floor(w * dpr) || canvas.height !== Math.floor(h * dpr)) {
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
  }

  ctx.save();
  ctx.scale(dpr, dpr);

  ctx.fillStyle = "#000000";
  ctx.fillRect(0, 0, w, h);

  const targetFreqs = [200, 500, 1000, 1500, 2000, 2500];
  ctx.strokeStyle = "rgba(75, 85, 99, 0.4)";
  ctx.lineWidth = 1;
  ctx.fillStyle = "#9ca3af";
  ctx.font = "10px sans-serif";

  targetFreqs.forEach(f => {
    const x = ((f - 80) / (3000 - 80)) * w;
    if (x >= 0 && x <= w) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
      ctx.fillText(f, x + 4, h - 6);
    }
  });

  for (let y = h / 4; y < h; y += h / 4) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  const scanY = (Date.now() % 3000) / 3000 * h;
  ctx.fillStyle = "rgba(37, 99, 235, 0.15)";
  ctx.fillRect(0, scanY, w, 2);

  ctx.restore();
}

function renderWaveform() {
  if (!analyser) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  ctx.save();
  ctx.scale(dpr, dpr);

  analyser.getByteFrequencyData(spectrumArray);
  ctx.fillStyle = "rgba(37, 99, 235, 0.7)";

  for (let i = 0; i < spectrumArray.length; i++) {
    const f = i * audioCtx.sampleRate / fftSize;
    if (f < 80 || f > 3000) continue;
    const x = ((f - 80) / (3000 - 80)) * w;
    const barHeight = (spectrumArray[i] / 255) * h;
    ctx.fillRect(x, h - barHeight, 2, barHeight);
  }

  ctx.restore();
}

/* ============================
   メインループ（軽量化済）
============================ */
function mainLoop() {
  drawSpectrumGrid();

  if (running && !locked && !isPlayingTimelapse) {
    const freq = estimateFrequencyAdvanced();
    const { motorRPM, speed } = calculateMetrics(freq);

    if (motorRPM > 0) {
      currentSessionRPMs.push(motorRPM);
      globalTimelapseLog.push({
        time: Date.now(), freq: freq, rpm: motorRPM, speed: speed,
        volt: slideVolt.value, gear: GEAR_VALUES[slideGear.value], tire: slideTire.value
      });
      updateTimelapseUI();
    }

    document.getElementById("rpmValue").textContent = Math.round(motorRPM) + " RPM";
    document.getElementById("speedValue").textContent = speed.toFixed(1) + " km/h";

    if (currentSessionRPMs.length > 0) {
      const max = Math.max(...currentSessionRPMs);
      const min = Math.min(...currentSessionRPMs);
      const avg = currentSessionRPMs.reduce((a,b)=>a+b, 0) / currentSessionRPMs.length;

      document.getElementById("sessMax").textContent = Math.round(max);
      document.getElementById("sessMin").textContent = Math.round(min);
      document.getElementById("sessAvg").textContent = Math.round(avg);
      document.getElementById("sessCount").textContent = currentSessionRPMs.length;
    }

    renderWaveform();
  } else {
    renderWaveform();
  }

  requestAnimationFrame(mainLoop);
}

/* ============================
   行列表生成（そのまま）
============================ */
function generateMatrixTable(baseMotorRPM, currentVolt) {
  const table = document.getElementById("matrixTable");
  table.innerHTML = "";
  const tire = parseFloat(slideTire.value);
  const curVoltStr = currentVolt.toFixed(1);

  let theadHTML = `<thead><tr>
    <th>電圧</th>
    <th style="color: var(--accent-color);">モーター<br><span style="font-size:10px;">RPM</span></th>`;
  GEAR_VALUES.forEach(g => {
    theadHTML += `<th style="color: #f59e0b;">${g.toFixed(1)}:1<br><span style="font-size:9px; font-weight:normal; opacity:0.8;">RPM / KM/H</span></th>`;
  });
  theadHTML += `</tr></thead>`;

  let tbodyHTML = "<tbody>";

  MATRIX_VOLTS.forEach(v => {
    const isCurrent = (v.toFixed(1) === curVoltStr);
    const rowClass = isCurrent ? ' class="current-volt-row"' : '';

    tbodyHTML += `<tr${rowClass}>`;
    tbodyHTML += `<td style="font-weight:bold;">${v.toFixed(1)}V</td>`;

    let estMotorRPM = 0;
    if (baseMotorRPM > 0 && currentVolt > 0) {
      estMotorRPM = baseMotorRPM * (v / currentVolt);
    }

    tbodyHTML += `<td style="font-weight:500;">${estMotorRPM > 0 ? Math.round(estMotorRPM) : "---"}</td>`;

    GEAR_VALUES.forEach(g => {
      if (estMotorRPM > 0) {
        const wheelRPM = estMotorRPM / g;
        const speed = wheelRPM * (Math.PI * (tire / 1000)) * 60 / 1000;
        tbodyHTML += `<td>
          <div style="font-weight:bold;">${Math.round(wheelRPM)}</div>
          <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">${speed.toFixed(1)} km/h</div>
        </td>`;
      } else {
        tbodyHTML += `<td>
          <div style="opacity:0.4;">---</div>
          <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">--- km/h</div>
        </td>`;
      }
    });

    tbodyHTML += `</tr>`;
  });

  tbodyHTML += "</tbody>";
  table.innerHTML = theadHTML + tbodyHTML;
}

/* ============================
   タイムラプス
============================ */
function updateTimelapseUI() {
  if (globalTimelapseLog.length > 0) {
    timelapseSlider.max = globalTimelapseLog.length - 1;
    timelapseSlider.disabled = false; 
    tlPlayBtn.disabled = false; 
    tlResetBtn.disabled = false;
  } else {
    timelapseSlider.disabled = true; 
    tlPlayBtn.disabled = true; 
    tlResetBtn.disabled = true;
  }
}

timelapseSlider.addEventListener("input", () => {
  const frame = globalTimelapseLog[timelapseSlider.value];
  if (!frame) return;
  document.getElementById("rpmValue").textContent = Math.round(frame.rpm) + " RPM";
  document.getElementById("speedValue").textContent = frame.speed.toFixed(1) + " km/h";
  generateMatrixTable(frame.rpm, parseFloat(frame.volt));
});

/* ============================
   保存
============================ */
saveBtn.addEventListener("click", () => {
  if (!lockedData) {
    alert("一度計測を【停止】し、【ロック】を行ってから保存してください。");
    return;
  }

  const motorName = prompt("計測したモーター名や電池の組み合わせを入力:", "カスタムモーター");
  if (motorName === null) return;
  const finalName = motorName.trim() === "" ? "未命名モーター" : motorName.trim();

  const history = JSON.parse(localStorage.getItem("rpmHistoryV3") || "[]");

  lockedData.name = finalName;
  lockedData.id = Date.now();

  history.push(lockedData);
  localStorage.setItem("rpmHistoryV3", JSON.stringify(history));

  updateAllHistoryComponents();
  alert(`「${finalName}」のデータを保存しました！`);

  locked = false; 
  lockedData = null;
  lockBtn.textContent = "🔒 ロック";
});

/* ============================
   リセット
============================ */
resetBtn.addEventListener("click", () => {
  running = false; 
  locked = false; 
  lockedData = null; 
  currentSessionRPMs = [];

  startBtn.textContent = "▶ 計測開始"; 
  lockBtn.textContent = "🔒 ロック";

  document.getElementById("rpmValue").textContent = "0 RPM";
  document.getElementById("speedValue").textContent = "0.0 km/h";
  document.getElementById("sessMax").textContent = "0";
  document.getElementById("sessMin").textContent = "0";
  document.getElementById("sessAvg").textContent = "0";
  document.getElementById("sessCount").textContent = "0";

  generateMatrixTable(0, parseFloat(slideVolt.value));
});

/* ============================
   履歴管理
============================ */
function updateMotorCompareTable(history) {
  const tbody = document.getElementById("motorCompareTableBody");
  if (!tbody) return;
  tbody.innerHTML = "";

  const motorMap = {};
  history.forEach(item => {
    if (!motorMap[item.name]) motorMap[item.name] = [];
    motorMap[item.name].push(item);
  });

  const names = Object.keys(motorMap);
  if (names.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="color:var(--text-muted);">データがありません。</td></tr>`;
    return;
  }

  names.forEach(name => {
    const runs = motorMap[name];
    const maxRPM = Math.max(...runs.map(r => r.maxRpm));
    const maxSpeed = Math.max(...runs.map(r => r.maxSpeed));
    const avgRPM = Math.round(runs.reduce((sum, r) => sum + r.avgRpm, 0) / runs.length);
    const volts = [...new Set(runs.map(r => r.volt + "V"))].join(", ");

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="font-weight:bold;">🏎️ ${name}</td>
      <td>${volts}</td>
      <td style="color:#ef4444; font-weight:bold;">${maxRPM}</td>
      <td>${avgRPM}</td>
      <td style="color:#10b981; font-weight:bold;">${maxSpeed.toFixed(1)} km/h</td>
    `;
    tbody.appendChild(tr);
  });
}

function populateFilterOptions(history) {
  const names = [...new Set(history.map(h => h.name))];
  const volts = [...new Set(history.map(h => h.volt))].sort();
  const gears = [...new Set(history.map(h => h.gear))].sort();
  const tires = [...new Set(history.map(h => h.tire))].sort();

  updateSelectOptions("filterName", names);
  updateSelectOptions("filterVolt", volts, "V");
  updateSelectOptions("filterGear", gears, ":1");
  updateSelectOptions("filterTire", tires, "mm");
}

function updateSelectOptions(elementId, array, suffix = "") {
  const select = document.getElementById(elementId);
  if (!select) return;

  const currentVal = select.value;
  select.innerHTML = '<option value="">すべて</option>';
  array.forEach(item => {
    const opt = document.createElement("option");
    opt.value = item;
    opt.textContent = item + suffix;
    if (item.toString() === currentVal) opt.selected = true;
    select.appendChild(opt);
  });
}

function applyFilters() {
  const history = JSON.parse(localStorage.getItem("rpmHistoryV3") || "[]");

  const fName = document.getElementById("filterName").value;
  const fVolt = document.getElementById("filterVolt").value;
  const fGear = document.getElementById("filterGear").value;
  const fTire = document.getElementById("filterTire").value;

  const filtered = history.filter(h => {
    return (!fName || h.name === fName) &&
           (!fVolt || h.volt === fVolt) &&
           (!fGear || h.gear === fGear) &&
           (!fTire || h.tire === fTire);
  });

  renderHistoryRows(filtered);
}

function renderHistoryRows(data) {
  const tbody = document.getElementById("historyTable");
  tbody.innerHTML = "";

  data.forEach((item) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.date}</td>
      <td style="font-weight:bold;">${item.name}</td>
      <td style="color:#ef4444; font-weight:bold;">${item.maxRpm}</td>
      <td>${item.avgRpm}</td>
      <td>${item.volt} V</td>
      <td style="font-weight:bold;">${item.gear}:1</td>
      <td>${item.tire} mm</td>
      <td><button class="btn-danger btn-sm" onclick="deleteRecord(${item.id})">削除</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function updateAllHistoryComponents() {
  const history = JSON.parse(localStorage.getItem("rpmHistoryV3") || "[]");
  populateFilterOptions(history);
  updateMotorCompareTable(history);
  applyFilters();
}

window.deleteRecord = function(id) {
  if (!confirm("このレコードを削除しますか？")) return;
  let history = JSON.parse(localStorage.getItem("rpmHistoryV3") || "[]");
  history = history.filter(item => item.id !== id);
  localStorage.setItem("rpmHistoryV3", JSON.stringify(history));
  updateAllHistoryComponents();
};

document.getElementById("clearAllBtn").addEventListener("click", () => {
  if (!confirm("⚠️ 本当にすべての履歴データを完全に消去しますか？")) return;
  localStorage.removeItem("rpmHistoryV3");
  updateAllHistoryComponents();
});

/* ============================
   CSV / Excel 出力
============================ */
document.getElementById("exportCSV").addEventListener("click", () => {
  const history = JSON.parse(localStorage.getItem("rpmHistoryV3") || "[]");
  if (history.length === 0) return alert("データがありません");

  let csv = "計測日,モーター名,MAX RPM,AVG RPM,電圧(V),ギヤ比,タイヤ径(mm)\n";
  history.forEach(h => { 
    csv += `${h.date},${h.name},${h.maxRpm},${h.avgRpm},${h.volt},${h.gear},${h.tire}\n`; 
  });

  const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; 
  a.download = `mini4wd_rpm_${new Date().toISOString().split('T')[0]}.csv`; 
  a.click();
});

document.getElementById("exportExcel").addEventListener("click", () => {
  const history = JSON.parse(localStorage.getItem("rpmHistoryV3") || "[]");
  if (history.length === 0) return alert("データがありません");

  let excelTemplate = `<html><head><meta charset="UTF-8"></head><body><table border="1">
  <tr style="background-color:#3b82f6; color:white; font-weight:bold;">
  <th>計測日</th><th>モーター名</th><th>MAX RPM</th><th>AVG RPM</th><th>電圧(V)</th><th>ギヤ比</th><th>タイヤ径(mm)</th></tr>`;

  history.forEach(h => {
    excelTemplate += `<tr><td>${h.date}</td><td>${h.name}</td><td>${h.maxRpm}</td><td>${h.avgRpm}</td><td>${h.volt}</td><td>${h.gear}</td><td>${h.tire}</td></tr>`;
  });

  excelTemplate += `</table></body></html>`;

  const blob = new Blob([excelTemplate], { type: "application/vnd.ms-excel;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; 
  a.download = `mini4wd_ledger_${new Date().toISOString().split('T')[0]}.xls`; 
  a.click();
});

/* ============================
   初期起動
============================ */
updateSliderLabels();
generateMatrixTable(0, parseFloat(slideVolt.value));
updateAllHistoryComponents();
requestAnimationFrame(mainLoop);
</script>
