<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini4WD Ultra Precision Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { font-family: sans-serif; padding: 20px; background: #f0f2f5; text-align: center; }
    .display-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 20px auto; max-width: 400px; }
    #rpmFinal { font-size: 72px; color: #007bff; font-weight: bold; margin-top: 10px; }
    button { padding: 20px 40px; font-size: 20px; cursor: pointer; width: 100%; border-radius: 10px; border: none; background: #28a745; color: white; }
</style>
</head>
<body>

<h2>Ultra Precision RPM Meter ver1</h2>
<button id="startButton">計測開始</button>

<div class="display-box">
    <div>現在の回転数 (16384 FFT)</div>
    <div id="rpmFinal">-- RPM</div>
</div>

<script>
let audioCtx;
let analyser;
let dataArray;
const FFT_SIZE = 16384; // 最高解像度に固定

async function startAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(stream);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    dataArray = new Float32Array(analyser.frequencyBinCount);
    source.connect(analyser);

    loop();
}

function getPrecisePeak(data, fftSize, sampleRate) {
    // 50Hz(3000RPM) ～ 1000Hz(60000RPM) の範囲を検索
    const minBin = Math.floor(50 * fftSize / sampleRate);
    const maxBin = Math.floor(1000 * fftSize / sampleRate);
    
    let maxVal = -Infinity, maxIdx = -1;
    for (let i = minBin; i < maxBin; i++) {
        if (data[i] > maxVal) { 
            maxVal = data[i]; 
            maxIdx = i; 
        }
    }
    
    // ピークが検出できない場合は0
    if (maxIdx <= minBin || maxIdx >= maxBin - 1) return 0;

    // 放物線補間でさらに精度を上げる（小数点以下の周波数を推定）
    const y1 = data[maxIdx - 1], y2 = data[maxIdx], y3 = data[maxIdx + 1];
    const offset = (y1 - y3) / (2 * (y1 - 2 * y2 + y3));
    return ((maxIdx + offset) * sampleRate) / fftSize;
}

function loop() {
    requestAnimationFrame(loop);
    
    analyser.getFloatFrequencyData(dataArray);
    const freq = getPrecisePeak(dataArray, FFT_SIZE, audioCtx.sampleRate);
    
    if (freq > 0) {
        const rpm = freq * 60;
        // 整数値として表示
        document.getElementById("rpmFinal").textContent = Math.round(rpm) + " RPM";
    }
}

document.getElementById("startButton").addEventListener("click", () => {
    if (!audioCtx) startAudio();
    else audioCtx.resume();
});
</script>
</body>
</html>
