<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Motor RPM Spectrogram Analyzer (100Hz-1000Hz)</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #eee; text-align: center; }
        .controls { margin: 20px; }
        button { font-size: 1.2em; padding: 10px 25px; cursor: pointer; border: none; border-radius: 5px; margin: 0 10px; font-weight: bold; }
        #startBtn { background-color: #27ae60; color: white; }
        #stopBtn { background-color: #c0392b; color: white; }
        #canvasContainer { width: 1000px; height: 500px; margin: 0 auto; background: black; border: 2px solid #444; }
        canvas { display: block; }
        #status { margin-top: 10px; font-size: 1.2em; color: #f1c40f; }
    </style>
</head>
<body>
    <h1>Motor Audio Spectrogram (100Hz - 1000Hz)</h1>
    
    <div class="controls">
        <button id="startBtn">集音スタート</button>
        <button id="stopBtn" disabled>ストップ</button>
    </div>
    <div id="canvasContainer">
        <canvas id="spectrogramCanvas" width="1000" height="500"></canvas>
    </div>
    <div id="status">Ready</div>

    <script>
        const canvas = document.getElementById('spectrogramCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');

        let audioCtx, analyser, dataArray, animationId;
        const MIN_FREQ = 100;
        const MAX_FREQ = 1000;

        startBtn.onclick = async () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);

            // バンドパスフィルタ設定 (100Hz-1000Hz)
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 550; 
            filter.Q.value = 0.8; 

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 8192; // 解像度を上げて周波数を精細に解析
            
            source.connect(filter);
            filter.connect(analyser);

            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            status.innerText = "Recording... Analyzing 100Hz to 1000Hz";
            
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            draw();
        };

        stopBtn.onclick = () => {
            cancelAnimationFrame(animationId);
            audioCtx.close();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            status.innerText = "Stopped";
        };

        function draw() {
            analyser.getByteFrequencyData(dataArray);
            const height = canvas.height;
            const imageData = ctx.createImageData(1, height);

            for (let i = 0; i < dataArray.length; i++) {
                const freq = i * (audioCtx.sampleRate / 2) / dataArray.length;
                
                // 100Hz〜1000Hzの範囲のみを描画
                if (freq >= MIN_FREQ && freq <= MAX_FREQ) {
                    const y = Math.floor(height - ((freq - MIN_FREQ) / (MAX_FREQ - MIN_FREQ)) * height);
                    const val = dataArray[i];
                    
                    // 熱マップ的な色付け
                    const pos = (height - y) * 4;
                    imageData.data[pos] = val;         // R
                    imageData.data[pos + 1] = val / 2; // G
                    imageData.data[pos + 2] = 255 - val; // B
                    imageData.data[pos + 3] = 255;
                }
            }

            // 右から左へずらす描画
            const imgData = ctx.getImageData(1, 0, canvas.width - 1, height);
            ctx.putImageData(imgData, 0, 0);
            ctx.putImageData(imageData, canvas.width - 1, 0);

            animationId = requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
