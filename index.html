<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Mini4WD RPM Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body {
    margin: 0;
    padding: 20px;
    background: #0b0f1a;
    color: #e8ecf7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  h1 {
    text-align: center;
    margin-bottom: 10px;
  }
  .section {
    background: #111827;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 20px;
    border: 1px solid #1f2937;
  }
  .section h2 {
    margin-top: 0;
    font-size: 18px;
    border-bottom: 1px solid #374151;
    padding-bottom: 6px;
  }
  label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
  }
  input, select, button {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border-radius: 6px;
    border: 1px solid #4b5563;
    background: #1f2937;
    color: #e8ecf7;
    font-size: 14px;
  }
  button {
    cursor: pointer;
    background: #2563eb;
    border: none;
    margin-top: 10px;
  }
  button:hover {
    background: #1d4ed8;
  }
  .button-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .button-row button {
    flex: 1;
  }
  #spectrumCanvas {
    width: 100%;
    height: 150px;
    background: #0f172a;
    border-radius: 8px;
    margin-top: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th, td {
    border: 1px solid #374151;
    padding: 6px;
    font-size: 13px;
  }
  th {
    background: #1f2937;
  }
  #chartContainer {
    width: 100%;
    height: 300px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<h1>Mini4WD RPM Analyzer</h1>

<!-- 計測コントロール -->
<div class="section">
  <h2>計測コントロール</h2>

  <button id="startBtn">▶ 計測開始</button>

  <div class="button-row">
    <button id="lockBtn">🔒 ロック</button>
    <button id="saveBtn">💾 保存</button>
    <button id="resetBtn">♻ リセット</button>
  </div>

  <h3>現在の計測値</h3>
  <p>RPM: <span id="rpmValue">0</span></p>
  <p>周波数: <span id="freqValue">0.0</span> Hz</p>
  <p>電圧: <span id="voltValue">0.0</span> V</p>

  <h3>スペクトラム表示</h3>
  <canvas id="spectrumCanvas"></canvas>
</div>

<!-- 設定 -->
<div class="section">
  <h2>設定</h2>

  <label>タイヤ径 (22.0〜35.0mm / 0.1刻み)
    <input id="tireInput" type="number" min="22.0" max="35.0" step="0.1" value="25.0">
  </label>

  <label>ギヤ比
    <select id="gearSelect">
      <option value="3.5">3.5:1</option>
      <option value="3.7">3.7:1</option>
      <option value="4.0">4.0:1</option>
      <option value="4.1">4.1:1</option>
      <option value="4.2">4.2:1</option>
      <option value="4.5">4.5:1</option>
      <option value="5.0">5.0:1</option>
    </select>
  </label>

  <label>電圧 (2.2〜3.5V / 0.1刻み)
    <input id="voltInput" type="number" min="2.2" max="3.5" step="0.1" value="3.0">
  </label>

  <label>ノイズ閾値 (dB)
    <input id="noiseInput" type="number" min="-140" max="-80" step="1" value="-120">
  </label>
</div>

<!-- 履歴 -->
<div class="section">
  <h2>履歴データ</h2>

  <button id="exportCSV">CSVエクスポート</button>
  <button id="exportJSON">JSONエクスポート</button>

  <table>
    <thead>
      <tr>
        <th>日時</th>
        <th>RPM</th>
        <th>周波数</th>
        <th>電圧</th>
        <th>タイヤ径</th>
        <th>ギヤ比</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>
</div>

<!-- グラフ -->
<div class="section">
  <h2>グラフ表示</h2>
  <div id="chartContainer">
    <canvas id="historyChart"></canvas>
  </div>
</div>

</body>
</html>



<script>
/* ============================
   変数定義
============================ */
let audioCtx = null;
let analyser = null;
let micSource = null;
let running = false;

let spectrumArray = null;
let timeDomainArray = null;

const fftSize = 2048;

const startBtn = document.getElementById("startBtn");
const lockBtn = document.getElementById("lockBtn");
const saveBtn = document.getElementById("saveBtn");
const resetBtn = document.getElementById("resetBtn");

const rpmValue = document.getElementById("rpmValue");
const freqValue = document.getElementById("freqValue");
const voltValue = document.getElementById("voltValue");

const tireInput = document.getElementById("tireInput");
const gearSelect = document.getElementById("gearSelect");
const voltInput = document.getElementById("voltInput");
const noiseInput = document.getElementById("noiseInput");

const spectrumCanvas = document.getElementById("spectrumCanvas");
const sctx = spectrumCanvas.getContext("2d");

let locked = false;
let lockedData = null;

/* ============================
   AudioContext 初期化
============================ */
async function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = fftSize;
    analyser.smoothingTimeConstant = 0.6;

    spectrumArray = new Uint8Array(analyser.frequencyBinCount);
    timeDomainArray = new Float32Array(analyser.fftSize);
  }

  if (!micSource) {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });
    micSource = audioCtx.createMediaStreamSource(stream);
    micSource.connect(analyser);
  }
}

/* ============================
   FFTスペクトラム描画
============================ */
function drawSpectrum() {
  const w = spectrumCanvas.width;
  const h = spectrumCanvas.height;

  sctx.fillStyle = "#0f172a";
  sctx.fillRect(0, 0, w, h);

  analyser.getByteFrequencyData(spectrumArray);

  const barWidth = w / spectrumArray.length;

  for (let i = 0; i < spectrumArray.length; i++) {
    const v = spectrumArray[i];
    const barHeight = (v / 255) * h;

    sctx.fillStyle = `rgb(${v}, ${150}, ${255 - v})`;
    sctx.fillRect(i * barWidth, h - barHeight, barWidth, barHeight);
  }
}

/* ============================
   周波数推定（最大ピーク方式）
============================ */
function estimateFrequency() {
  analyser.getByteFrequencyData(spectrumArray);

  let maxVal = 0;
  let maxIndex = 0;

  for (let i = 0; i < spectrumArray.length; i++) {
    if (spectrumArray[i] > maxVal) {
      maxVal = spectrumArray[i];
      maxIndex = i;
    }
  }

  const freq = maxIndex * (audioCtx.sampleRate / analyser.fftSize);
  return freq;
}

/* ============================
   RPM 計算
============================ */
function computeRPM(freq) {
  if (freq <= 0) return 0;

  const gear = parseFloat(gearSelect.value);
  const tire = parseFloat(tireInput.value);

  const rpmMotor = freq * 60; // 2極固定
  const rpmAxle = rpmMotor / gear;

  const tireM = tire / 1000;
  const speed = rpmAxle * (Math.PI * tireM) * 60 / 1000;

  return { rpmMotor, speed };
}

/* ============================
   メインループ
============================ */
function loop() {
  if (running && !locked) {
    const freq = estimateFrequency();
    const { rpmMotor } = computeRPM(freq);

    freqValue.textContent = freq.toFixed(1);
    rpmValue.textContent = Math.round(rpmMotor);
    voltValue.textContent = parseFloat(voltInput.value).toFixed(1);

    drawSpectrum();
  } else {
    drawSpectrum();
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ============================
   ボタン動作
============================ */
startBtn.addEventListener("click", async () => {
  if (!audioCtx) await initAudio();

  running = !running;
  startBtn.textContent = running ? "■ 停止" : "▶ 計測開始";
});

lockBtn.addEventListener("click", () => {
  locked = !locked;

  if (locked) {
    lockedData = {
      rpm: rpmValue.textContent,
      freq: freqValue.textContent,
      volt: voltValue.textContent,
      tire: tireInput.value,
      gear: gearSelect.value
    };
    lockBtn.textContent = "🔓 ロック解除";
  } else {
    lockedData = null;
    lockBtn.textContent = "🔒 ロック";
  }
});

resetBtn.addEventListener("click", () => {
  locked = false;
  lockedData = null;
  rpmValue.textContent = "0";
  freqValue.textContent = "0.0";
  lockBtn.textContent = "🔒 ロック";
});

/* ============================
   履歴保存（STEP3で拡張）
============================ */
saveBtn.addEventListener("click", () => {
  if (!lockedData) return;

  const history = JSON.parse(localStorage.getItem("rpmHistory") || "[]");

  history.push({
    time: new Date().toLocaleString(),
    ...lockedData
  });

  localStorage.setItem("rpmHistory", JSON.stringify(history));

  alert("保存しました（STEP3で一覧表示を実装）");
});
</script>



<script>
/* ============================
   履歴テーブル更新
============================ */
function updateHistoryTable() {
  const history = JSON.parse(localStorage.getItem("rpmHistory") || "[]");
  const tbody = document.getElementById("historyTable");
  tbody.innerHTML = "";

  history.forEach((item, index) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.time}</td>
      <td>${item.rpm}</td>
      <td>${item.freq}</td>
      <td>${item.volt}</td>
      <td>${item.tire}</td>
      <td>${item.gear}</td>
    `;

    tbody.appendChild(tr);
  });
}

updateHistoryTable();

/* ============================
   CSV エクスポート
============================ */
document.getElementById("exportCSV").addEventListener("click", () => {
  const history = JSON.parse(localStorage.getItem("rpmHistory") || "[]");
  if (history.length === 0) {
    alert("履歴がありません");
    return;
  }

  let csv = "time,rpm,freq,volt,tire,gear\n";
  history.forEach(h => {
    csv += `${h.time},${h.rpm},${h.freq},${h.volt},${h.tire},${h.gear}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "rpm_history.csv";
  a.click();
});

/* ============================
   JSON エクスポート
============================ */
document.getElementById("exportJSON").addEventListener("click", () => {
  const history = JSON.parse(localStorage.getItem("rpmHistory") || "[]");

  const blob = new Blob([JSON.stringify(history, null, 2)], {
    type: "application/json"
  });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "rpm_history.json";
  a.click();
});

/* ============================
   Chart.js グラフ描画
============================ */
let chart = null;

function drawChart() {
  const history = JSON.parse(localStorage.getItem("rpmHistory") || "[]");

  const ctx = document.getElementById("historyChart").getContext("2d");

  const labels = history.map(h => h.volt + "V");
  const rpmData = history.map(h => Number(h.rpm));

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "RPM",
          data: rpmData,
          borderColor: "#4ea3ff",
          backgroundColor: "rgba(78,163,255,0.3)",
          borderWidth: 2,
          tension: 0.2
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          beginAtZero: false
        }
      }
    }
  });
}

drawChart();

/* ============================
   保存ボタン → 履歴更新＋グラフ更新
============================ */
saveBtn.addEventListener("click", () => {
  if (!lockedData) return;

  const history = JSON.parse(localStorage.getItem("rpmHistory") || "[]");

  history.push({
    time: new Date().toLocaleString(),
    ...lockedData
  });

  localStorage.setItem("rpmHistory", JSON.stringify(history));

  updateHistoryTable();
  drawChart();

  alert("保存しました！");
});
</script>
