<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini4WD RPM Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: sans-serif;
    background: #fff;
    margin: 0;
    padding: 20px;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 999px;
    border: 1px solid #ccc;
    background: #f5f7ff;
    cursor: pointer;
    margin-right: 10px;
}
button:disabled {
    background: #eee;
}
canvas {
    width: 100%;
    height: 200px;
    background: #fafafa;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>Mini4WD RPM Analyzer</h2>

<div id="status">集音開始ボタンを押してください。</div>

<button id="startButton">集音開始</button>
<button id="stopButton" disabled>集音停止</button>

<div id="rpmDisplay">RPM: --</div>
<div>揺れ幅：<span id="shakeHz">-- Hz</span></div>

<canvas id="fftCanvas"></canvas>

<script>
let audioCtx = null;
let analyser = null;
let dataArray = null;
let sampleRate = 48000;
let isRunning = false;
let micStream = null;   // ★ マイクストリームを保持する

let freqHistory = [];
const MAX_HISTORY = 200;

function recordFrequency(peakHz) {
    freqHistory.push(peakHz);
    if (freqHistory.length > MAX_HISTORY) freqHistory.shift();
}

function getFrequencyShake() {
    if (freqHistory.length < 5) return {min:0, max:0, shake:0};
    const minHz = Math.min(...freqHistory);
    const maxHz = Math.max(...freqHistory);
    return {min:minHz, max:maxHz, shake:maxHz - minHz};
}

function detectPeak(dataArray, sampleRate) {
    let maxVal = -Infinity;
    let maxIndex = 0;
    for (let i = 0; i < dataArray.length; i++) {
        if (dataArray[i] > maxVal) {
            maxVal = dataArray[i];
            maxIndex = i;
        }
    }
    return (maxIndex * sampleRate) / (dataArray.length * 2);
}

function computeRpm(peakHz) {
    return peakHz * 60;
}

const canvas = document.getElementById("fftCanvas");
const ctx = canvas.getContext("2d");

function drawFFT() {
    if (!ctx || !dataArray) return;
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    ctx.strokeStyle = "#ff2e9f";
    ctx.lineWidth = 2;

    for (let i = 0; i < dataArray.length; i++) {
        const x = (i / dataArray.length) * w;
        const v = dataArray[i];
        const y = h - ((v + 140) / 80) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

function mainLoop() {
    if (!isRunning) return;
    requestAnimationFrame(mainLoop);

    analyser.getFloatFrequencyData(dataArray);
    let peakHz = detectPeak(dataArray, sampleRate);

    if (peakHz < 100 || peakHz > 1800) return;

    recordFrequency(peakHz);

    const rpm = computeRpm(peakHz) * 1.02;
    document.getElementById("rpmDisplay").textContent = `RPM: ${rpm.toFixed(0)}`;

    const shakeInfo = getFrequencyShake();
    document.getElementById("shakeHz").textContent = `${shakeInfo.shake.toFixed(1)} Hz`;

    drawFFT();
}

const statusEl = document.getElementById("status");
const startButton = document.getElementById("startButton");
const stopButton = document.getElementById("stopButton");

// ★ 集音開始 → 許可 → 計測開始
startButton.addEventListener("click", async () => {
    statusEl.textContent = "マイク許可をリクエスト中…";

    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        statusEl.textContent = "集音中…";

        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 4096;

        dataArray = new Float32Array(analyser.frequencyBinCount);

        const source = audioCtx.createMediaStreamSource(micStream);
        source.connect(analyser);

        sampleRate = audioCtx.sampleRate;

        isRunning = true;
        startButton.disabled = true;
        stopButton.disabled = false;

        mainLoop();

    } catch (e) {
        console.error(e);
        statusEl.textContent = "マイク許可が拒否されました。設定から許可してください。";
    }
});

// ★ 測定停止 → マイク集音も完全停止
stopButton.addEventListener("click", () => {
    isRunning = false;

    // ★ マイクストリーム停止
    if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
    }

    // ★ AudioContext 停止
    if (audioCtx) {
        audioCtx.close();
        audioCtx = null;
    }

    stopButton.disabled = true;
    startButton.disabled = false;
    statusEl.textContent = "停止中…";
});
</script>

</body>
</html>
